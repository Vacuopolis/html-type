<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>创意互动实验室 — 好玩又有趣的项目集合</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e;
  --bg-deep: #0a0a0f;
  --bg-primary: #0e0e14;
  --bg-secondary: #141420;
  --bg-surface: rgba(201, 169, 110, 0.03);
  --bg-card: #12121c;
  --bg-card-hover: #181826;
  --text-primary: #e8e4dc;
  --text-secondary: rgba(232, 228, 220, 0.5);
  --text-muted: rgba(232, 228, 220, 0.3);
  --border: rgba(201, 169, 110, 0.08);
  --border-hover: rgba(201, 169, 110, 0.2);
  --font-display: 'Cormorant Garamond', 'Georgia', serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'Space Mono', 'Consolas', monospace;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html {
  scroll-behavior: smooth;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  overflow-x: hidden;
  max-width: 100vw;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
  max-width: 100vw;
  overscroll-behavior-x: none;
  touch-action: pan-y pinch-zoom;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Mouse-following glow */
.cursor-glow {
  position: fixed;
  width: 420px;
  height: 420px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201, 169, 110, 0.1) 0%, rgba(201, 169, 110, 0.04) 40%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  transform: translate(-50%, -50%);
  will-change: auto;
}

/* Ambient floating particles canvas */
#ambientCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* Grid ripple overlay */
.grid-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.04;
  background-image:
    linear-gradient(rgba(201, 169, 110, 0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201, 169, 110, 0.5) 1px, transparent 1px);
  background-size: 80px 80px;
  -webkit-mask-image: radial-gradient(ellipse 45% 45% at var(--grid-mx, 50%) var(--grid-my, 50%), black 10%, transparent 70%);
  mask-image: radial-gradient(ellipse 45% 45% at var(--grid-mx, 50%) var(--grid-my, 50%), black 10%, transparent 70%);
}

/* Subtle noise texture overlay */
.noise-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.018;
  mix-blend-mode: overlay;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* Scroll progress bar */
.scroll-progress {
  position: fixed;
  top: 0;
  left: 0;
  width: 0%;
  height: 2px;
  background: var(--gold);
  z-index: 10000;
  transition: width 0.1s linear;
  will-change: width;
}

/* Navigation */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  padding: 0 1rem;
  transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  transform: translateY(-100%);
  opacity: 0;
  max-width: 100vw;
  overflow: hidden;
}

.nav.visible {
  transform: translateY(0);
  opacity: 1;
}

.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.55rem 1.5rem;
  margin-top: 0.6rem;
  background: rgba(14, 14, 20, 0.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  backdrop-filter: blur(24px) saturate(1.4);
  border-radius: 100px;
  border: 1px solid var(--border);
  box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
  min-width: 0;
}

.nav-logo {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--gold);
  white-space: nowrap;
  letter-spacing: 0.02em;
  flex-shrink: 0;
  text-decoration: none;
  cursor: pointer;
}

.nav-links {
  display: flex;
  gap: 0.15rem;
  list-style: none;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
  flex-shrink: 1;
  min-width: 0;
}

.nav-links::-webkit-scrollbar {
  display: none;
}

.nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  padding: 0.4rem 0.85rem;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 500;
  transition: color 0.3s ease, background 0.3s ease;
  position: relative;
  letter-spacing: 0.01em;
  white-space: nowrap;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--gold);
  background: rgba(201, 169, 110, 0.08);
}

.hamburger-btn {
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 34px;
  height: 34px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 7px;
  gap: 5px;
  z-index: 10001;
  border-radius: 50%;
  transition: background 0.3s ease;
  flex-shrink: 0;
}

.hamburger-btn:hover {
  background: rgba(201, 169, 110, 0.06);
}

.hamburger-btn span {
  display: block;
  width: 16px;
  height: 1.5px;
  background: var(--gold);
  border-radius: 2px;
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  transform-origin: center;
}

.hamburger-btn.active span:nth-child(1) {
  transform: rotate(45deg) translate(4.5px, 4.5px);
}

.hamburger-btn.active span:nth-child(2) {
  opacity: 0;
  transform: scaleX(0);
}

.hamburger-btn.active span:nth-child(3) {
  transform: rotate(-45deg) translate(4.5px, -4.5px);
}

/* Drawer */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 9998;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
}

.drawer-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.drawer-nav {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 280px;
  max-width: 85vw;
  background: rgba(14, 14, 20, 0.96);
  -webkit-backdrop-filter: blur(40px) saturate(1.4);
  backdrop-filter: blur(40px) saturate(1.4);
  z-index: 9999;
  transform: translateX(100%);
  transition: transform 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  border-left: 1px solid var(--border);
  padding: 5rem 1.5rem 2rem;
  overflow-y: auto;
  overscroll-behavior-y: contain;
}

.drawer-nav.visible {
  transform: translateX(0);
}

.drawer-nav ul {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.drawer-nav ul li a {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  color: var(--text-secondary);
  text-decoration: none;
  padding: 0.85rem 1.2rem;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 500;
  transition: color 0.3s ease, background 0.3s ease;
  letter-spacing: 0.01em;
}

.drawer-nav ul li a:hover,
.drawer-nav ul li a.active {
  color: var(--gold);
  background: rgba(201, 169, 110, 0.08);
}

.drawer-close {
  position: absolute;
  top: 1.2rem;
  right: 1.2rem;
  width: 36px;
  height: 36px;
  background: rgba(201, 169, 110, 0.06);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  transition: background 0.3s ease;
}

.drawer-close:hover {
  background: rgba(201, 169, 110, 0.12);
}

/* Hero - Asymmetric Split */
.hero {
  position: relative;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 2rem 2rem 4rem;
  z-index: 1;
}

.hero-inner {
  max-width: 1200px;
  margin: 0 auto;
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3rem;
  align-items: center;
  position: relative;
  z-index: 2;
}

.hero-content {
  position: relative;
  z-index: 3;
}

.hero h1 {
  font-family: var(--font-display);
  font-size: clamp(3.2rem, 7vw, 7rem);
  font-weight: 700;
  line-height: 1.05;
  margin-bottom: 1.8rem;
  letter-spacing: -0.03em;
  color: var(--text-primary);
  animation: revealUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
}

.hero h1 .line {
  display: block;
}

.hero h1 .accent {
  color: var(--gold);
  position: relative;
}

.hero h1 .accent::after {
  content: '';
  position: absolute;
  bottom: 0.05em;
  left: 0;
  width: 100%;
  height: 2px;
  background: var(--gold);
  transform: scaleX(0);
  transform-origin: left;
  animation: lineReveal 0.8s cubic-bezier(0.22, 1, 0.36, 1) 1s both;
}

@keyframes lineReveal {
  to { transform: scaleX(1); }
}

.hero-description {
  font-size: clamp(0.95rem, 1.8vw, 1.15rem);
  color: var(--text-secondary);
  max-width: 480px;
  margin-bottom: 2.5rem;
  line-height: 1.9;
  letter-spacing: 0.01em;
  animation: revealUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.5s both;
}

.hero-actions {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  animation: revealUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
}

.hero-canvas-wrap {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: revealUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both;
}

.hero-canvas-wrap canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.85rem 2.2rem;
  border-radius: 100px;
  font-size: 0.9rem;
  font-weight: 600;
  text-decoration: none;
  transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.4s cubic-bezier(0.22, 1, 0.36, 1), background 0.4s ease, border-color 0.4s ease;
  cursor: pointer;
  border: none;
  letter-spacing: 0.02em;
}

.btn-primary {
  background: var(--gold);
  color: var(--bg-deep);
  box-shadow: 0 4px 20px rgba(201, 169, 110, 0.25);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(201, 169, 110, 0.35);
}

.btn-secondary {
  background: rgba(201, 169, 110, 0.05);
  color: var(--gold);
  border: 1px solid rgba(201, 169, 110, 0.15);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
}

.btn-secondary:hover {
  background: rgba(201, 169, 110, 0.1);
  border-color: rgba(201, 169, 110, 0.3);
  transform: translateY(-2px);
}

@keyframes revealUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Main content */
.main-content {
  position: relative;
  z-index: 1;
  padding-top: 2rem;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
}

.section {
  margin-bottom: 10rem;
  scroll-margin-top: 100px;
}

/* Section headers - left aligned */
.section-header {
  text-align: left;
  margin-bottom: 4rem;
  opacity: 0;
  transform: translateY(40px);
  transition: opacity 1s cubic-bezier(0.22, 1, 0.36, 1), transform 1s cubic-bezier(0.22, 1, 0.36, 1);
}

.section-header.visible {
  opacity: 1;
  transform: translateY(0);
}

.section-icon {
  display: block;
  width: 44px;
  height: 44px;
  margin-bottom: 1rem;
  color: var(--gold);
  opacity: 0.7;
}

.section-title {
  font-family: var(--font-display);
  font-size: clamp(2.2rem, 5vw, 3.8rem);
  font-weight: 700;
  margin-bottom: 1rem;
  line-height: 1.15;
  letter-spacing: -0.02em;
  color: var(--gold);
}

.section-description {
  font-size: 1rem;
  color: var(--text-secondary);
  max-width: 520px;
  line-height: 1.8;
  letter-spacing: 0.01em;
}

/* ===== Layout: 互动项目 - Bento Grid ===== */
.bento-grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 1.5rem;
}

.bento-grid .project-card:first-child {
  grid-row: span 1;
}

.bento-grid .project-card:first-child .card-image-wrapper {
  height: 280px;
}

.bento-grid .project-card:last-child .card-image-wrapper {
  height: 280px;
}

/* ===== Layout: 小游戏 - Horizontal Scroll ===== */
.carousel-wrapper {
  position: relative;
}

.carousel-scroll {
  display: flex;
  gap: 1.5rem;
  overflow-x: auto;
  overflow-y: hidden;
  scroll-snap-type: x mandatory;
  touch-action: pan-x pinch-zoom;
  scrollbar-width: none;
  -ms-overflow-style: none;
  padding-bottom: 1rem;
}

.carousel-scroll::-webkit-scrollbar {
  display: none;
}

.carousel-scroll .project-card {
  flex: 0 0 calc(33.333% - 1rem);
  min-width: 300px;
  scroll-snap-align: start;
}

.carousel-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 1rem;
}

.carousel-nav-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.25s ease;
  flex-shrink: 0;
}

.carousel-nav-btn:hover {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201, 169, 110, 0.08);
}

.carousel-nav-btn:active {
  transform: scale(0.94);
}

.carousel-nav-btn:disabled {
  opacity: 0.25;
  cursor: default;
  pointer-events: none;
}

.carousel-nav-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
}

.carousel-nav-label {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--text-secondary);
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.carousel-nav-dots {
  display: flex;
  gap: 6px;
}

.carousel-nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: background 0.3s ease;
}

.carousel-nav-dot.active {
  background: var(--gold);
}

/* ===== Layout: 实用工具 - List ===== */
.list-layout {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.list-item {
  display: grid;
  grid-template-columns: 180px 1fr auto;
  gap: 2rem;
  align-items: center;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 1.5rem;
  transition: border-color 0.4s ease, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  opacity: 0;
  transform: translateY(30px);
  will-change: transform, opacity;
}

.list-item.visible {
  opacity: 1;
  transform: translateY(0);
}

.list-item:hover {
  border-color: var(--border-hover);
  transform: translateY(-4px);
}

.list-item-image {
  width: 180px;
  height: 110px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg-secondary);
  flex-shrink: 0;
}

.list-item-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.8s ease;
}

.list-item-image.loaded img {
  opacity: 1;
}

.list-item-image.placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px dashed rgba(201, 169, 110, 0.12);
}

.list-item-image .placeholder-text {
  font-size: 0.75rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
}

.list-item-body {
  min-width: 0;
}

.list-item-title {
  font-family: var(--font-display);
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.5rem;
  line-height: 1.3;
  letter-spacing: -0.01em;
}

.list-item-desc {
  color: var(--text-secondary);
  font-size: 0.88rem;
  line-height: 1.7;
  letter-spacing: 0.01em;
}

.list-item-cta {
  flex-shrink: 0;
}

/* Project Card (shared) */
.project-card {
  position: relative;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: border-color 0.4s ease, transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  opacity: 0;
  transform: translateY(50px);
  will-change: transform, opacity;
}

.project-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.project-card:hover {
  border-color: var(--border-hover);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(201, 169, 110, 0.06);
}

.card-image-wrapper {
  position: relative;
  height: 220px;
  overflow: hidden;
  background: var(--bg-secondary);
}

.card-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: transform 0.7s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1);
  will-change: opacity, transform;
}

.card-image-wrapper.loaded .card-image {
  opacity: 1;
}

.project-card:hover .card-image {
  transform: scale(1.04);
}

.card-image-wrapper.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(201, 169, 110, 0.02);
}

.card-image-wrapper.placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px dashed rgba(201, 169, 110, 0.12);
}

.card-image-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  width: 100%;
  height: 100%;
  color: var(--text-muted);
}

.placeholder-icon {
  font-size: 2rem;
  opacity: 0.3;
  line-height: 1;
}

.placeholder-text {
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  opacity: 0.5;
}

.placeholder-ratio {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  padding: 0.2rem 0.6rem;
  background: rgba(201, 169, 110, 0.08);
  border: 1px solid rgba(201, 169, 110, 0.12);
  border-radius: 4px;
  color: var(--gold);
  opacity: 0.6;
  letter-spacing: 0.05em;
}

.card-image-error {
  position: absolute;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--bg-secondary);
  z-index: 1;
}

.card-image-error span {
  font-size: 0.75rem;
  color: var(--text-muted);
}

.card-image-wrapper.error .card-image-error {
  display: flex;
}

.card-image-wrapper.error .card-image {
  display: none;
}

.card-body {

let drawerOpen = false;

function toggleDrawer(open) {
  const overlay = document.getElementById('drawerOverlay');
  const drawer = document.getElementById('drawerNav');
  const hamburger = document.getElementById('hamburgerBtn');

  if (open === undefined) open = !drawerOpen;
  drawerOpen = open;

  if (drawerOpen) {
    overlay.classList.add('visible');
    drawer.classList.add('visible');
    hamburger.classList.add('active');
    document.body.style.overflow = 'hidden';
  } else {
    overlay.classList.remove('visible');
    drawer.classList.remove('visible');
    hamburger.classList.remove('active');
    document.body.style.overflow = '';
    document.body.style.overflowX = 'hidden';
  }
}

function initHeroCanvas() {
  const canvas = document.getElementById('heroCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let width, height, particles, animationId;
  const isMobile = window.innerWidth <= 768;
  const PARTICLE_COUNT = isMobile ? 30 : 70;
  const CONNECTION_DISTANCE = isMobile ? 90 : 140;
  let mouse = { x: -9999, y: -9999 };

  // Bezier path system (same as ambient)
  function randomPt() {
    return { x: Math.random() * width, y: Math.random() * height };
  }

  function generateBezierPath(startX, startY) {
    const spread = Math.min(width, height) * 0.35;
    return {
      p0: { x: startX, y: startY },
      p1: { x: startX + (Math.random() - 0.5) * spread, y: startY + (Math.random() - 0.5) * spread },
      p2: { x: startX + (Math.random() - 0.5) * spread * 1.5, y: startY + (Math.random() - 0.5) * spread * 1.5 },
      p3: { x: startX + (Math.random() - 0.5) * spread * 2, y: startY + (Math.random() - 0.5) * spread * 2 },
      t: 0,
      speed: Math.random() * 0.0008 + 0.0003
    };
  }

  function cubicBezier(t, p0, p1, p2, p3) {
    const mt = 1 - t;
    const mt2 = mt * mt;
    const mt3 = mt2 * mt;
    const t2 = t * t;
    const t3 = t2 * t;
    return {
      x: mt3 * p0.x + 3 * mt2 * t * p1.x + 3 * mt * t2 * p2.x + t3 * p3.x,
      y: mt3 * p0.y + 3 * mt2 * t * p1.y + 3 * mt * t2 * p2.y + t3 * p3.y
    };
  }

  function resize() {
    width = canvas.width = canvas.offsetWidth;
    height = canvas.height = canvas.offsetHeight;
  }

  function createParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const start = randomPt();
      particles.push({
        x: start.x,
        y: start.y,
        path: generateBezierPath(start.x, start.y),
        vx: 0,
        vy: 0,
        radius: Math.random() * 1.8 + 0.6,
        baseOpacity: Math.random() * 0.45 + 0.2,
        opacity: 0,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.008 + 0.003
      });
    }
  }

  let pageVisible = true;

  function animate() {
    if (!pageVisible) {
      animationId = requestAnimationFrame(animate);
      return;
    }
    ctx.clearRect(0, 0, width, height);
    particles.forEach((p, i) => {
      // Advance along bezier path
      p.path.t += p.path.speed;
      if (p.path.t >= 1) {
        const endPt = p.path.p3;
        p.path = generateBezierPath(endPt.x, endPt.y);
      }

      const pos = cubicBezier(p.path.t, p.path.p0, p.path.p1, p.path.p2, p.path.p3);

      // Mouse repulsion
      const dx = pos.x - mouse.x;
      const dy = pos.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist > 0 && dist < 130) {
        const force = (130 - dist) / 130;
        p.vx += (dx / dist) * force * 0.4;
        p.vy += (dy / dist) * force * 0.4;
      }

      p.vx *= 0.92;
      p.vy *= 0.92;

      p.x = pos.x + p.vx;
      p.y = pos.y + p.vy;

      // Soft wrap
      if (p.x < -30) { p.x = width + 20; p.path = generateBezierPath(p.x, p.y); }
      if (p.x > width + 30) { p.x = -20; p.path = generateBezierPath(p.x, p.y); }
      if (p.y < -30) { p.y = height + 20; p.path = generateBezierPath(p.x, p.y); }
      if (p.y > height + 30) { p.y = -20; p.path = generateBezierPath(p.x, p.y); }

      // Pulse opacity
      p.pulse += p.pulseSpeed;
      p.opacity = p.baseOpacity + Math.sin(p.pulse) * 0.1;

      // Draw particle
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,185,120,${Math.max(0, p.opacity)})`;
      ctx.fill();

      // Connection lines
      for (let j = i + 1; j < particles.length; j++) {
        const p2 = particles[j];
        const ddx = p.x - p2.x;
        const ddy = p.y - p2.y;
        const distance = Math.sqrt(ddx * ddx + ddy * ddy);
        if (distance < CONNECTION_DISTANCE) {
          const alpha = (1 - distance / CONNECTION_DISTANCE) * 0.15;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = `rgba(220,185,120,${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
        }
      }
    });
    animationId = requestAnimationFrame(animate);
  }

  canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
  });

  canvas.addEventListener('touchmove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches[0];
    mouse.x = touch.clientX - rect.left;
    mouse.y = touch.clientY - rect.top;
  }, { passive: true });

  canvas.addEventListener('mouseleave', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  });

  canvas.addEventListener('touchend', () => {
    mouse.x = -9999;
    mouse.y = -9999;
  }, { passive: true });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (animationId) cancelAnimationFrame(animationId);
      resize();
      particles.forEach(p => { p.path = generateBezierPath(p.x, p.y); });
      animate();
    }, 250);
  });

  document.addEventListener('visibilitychange', () => {
    pageVisible = !document.hidden;
  });

  resize();
  createParticles();
  animate();
}

function loadImageWithRetry(img, src, wrapper, maxRetries, currentRetry) {
  if (currentRetry === undefined) currentRetry = 0;
  if (maxRetries === undefined) maxRetries = 3;

  const attemptLoad = () => {
    img.onload = () => {
      img.removeAttribute('data-src');
      if (wrapper) {
        wrapper.classList.remove('loading');
        requestAnimationFrame(() => {
          wrapper.classList.add('loaded');
        });
      }
    };
    img.onerror = () => {
      if (currentRetry < maxRetries) {
        setTimeout(() => {
          loadImageWithRetry(img, src, wrapper, maxRetries, currentRetry + 1);
        }, 1000 * (currentRetry + 1));
      } else {
        if (wrapper) {
          wrapper.classList.remove('loading');
          wrapper.classList.add('error');
        }
      }
    };
    img.src = src;
  };

  attemptLoad();
}

function lazyLoadImages() {
  const imgObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        const wrapper = img.closest('.card-image-wrapper, .list-item-image');
        const src = img.dataset.src;
        if (src) {
          loadImageWithRetry(img, src, wrapper, 3, 0);
        }
        imgObserver.unobserve(img);
      }
    });
  }, { rootMargin: '200px 0px', threshold: 0.01 });

  document.querySelectorAll('.card-image[data-src], .list-item-image img[data-src]').forEach(img => {
    imgObserver.observe(img);
  });
}

function setupScrollObservers() {
  const headerObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.15, rootMargin: '0px 0px -80px 0px' });

  document.querySelectorAll('.section-header').forEach(el => headerObserver.observe(el));

  const cardObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const delay = parseFloat(entry.target.dataset.delay || 0);
        setTimeout(() => {
          entry.target.classList.add('visible');
          entry.target.style.transition = `opacity 0.8s cubic-bezier(0.22,1,0.36,1) ${delay}s, transform 0.8s cubic-bezier(0.22,1,0.36,1) ${delay}s, border-color 0.4s ease`;
        }, 50);
        cardObserver.unobserve(entry.target);
      }
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

  document.querySelectorAll('.project-card, .list-item').forEach(el => cardObserver.observe(el));
}

function setupCarousels() {
  document.querySelectorAll('.carousel-wrapper').forEach(wrapper => {
    const scroll = wrapper.querySelector('.carousel-scroll');
    const prevBtn = wrapper.querySelector('.carousel-prev');
    const nextBtn = wrapper.querySelector('.carousel-next');
    const dots = wrapper.querySelectorAll('.carousel-nav-dot');
    if (!scroll || !prevBtn || !nextBtn) return;

    const cards = scroll.querySelectorAll('.project-card');
    const cardCount = cards.length;
    let currentIndex = 0;

    function getCardWidth() {
      if (cards.length === 0) return 300;
      return cards[0].offsetWidth + parseFloat(getComputedStyle(scroll).gap || 24);
    }

    function getVisibleCount() {
      return Math.floor(scroll.offsetWidth / getCardWidth()) || 1;
    }

    function scrollToIndex(index) {
      const maxIndex = Math.max(0, cardCount - getVisibleCount());
      currentIndex = Math.max(0, Math.min(index, maxIndex));
      const cardWidth = getCardWidth();
      scroll.scrollTo({ left: currentIndex * cardWidth, behavior: 'smooth' });
      updateDots();
      updateButtons();
    }

    function updateDots() {
      const visibleCount = getVisibleCount();
      const maxIndex = Math.max(0, cardCount - visibleCount);
      const activeIndex = Math.round(currentIndex);
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === activeIndex || (i >= activeIndex && i < activeIndex + visibleCount && i === activeIndex));
      });
      // Highlight the dot closest to current scroll position
      const scrollRatio = scroll.scrollLeft / (scroll.scrollWidth - scroll.offsetWidth || 1);
      const activeDot = Math.round(scrollRatio * (dots.length - 1));
      dots.forEach((dot, i) => dot.classList.toggle('active', i === activeDot));
    }

    function updateButtons() {
      const visibleCount = getVisibleCount();
      const maxIndex = Math.max(0, cardCount - visibleCount);
      prevBtn.disabled = currentIndex <= 0;
      nextBtn.disabled = currentIndex >= maxIndex;
    }

    prevBtn.addEventListener('click', () => scrollToIndex(currentIndex - 1));
    nextBtn.addEventListener('click', () => scrollToIndex(currentIndex + 1));

    // Sync dots on manual scroll (touch/drag)
    scroll.addEventListener('scroll', () => {
      const cardWidth = getCardWidth();
      currentIndex = Math.round(scroll.scrollLeft / cardWidth);
      updateDots();
      updateButtons();
    }, { passive: true });

    // Keyboard navigation
    wrapper.setAttribute('tabindex', '0');
    wrapper.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); scrollToIndex(currentIndex - 1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); scrollToIndex(currentIndex + 1); }
    });

    updateButtons();
  });
}

function setupNavigation() {
  const nav = document.getElementById('mainNav');
  const hero = document.getElementById('hero');
  if (!nav || !hero) return;

  const heroObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) {
        nav.classList.add('visible');
      } else {
        nav.classList.remove('visible');
      }
    });
  }, { threshold: 0.1 });

  heroObserver.observe(hero);

  let currentActiveId = '';

  function setActiveNav(id) {
    if (!id || id === currentActiveId) return;
    currentActiveId = id;
    const navLinksContainer = document.getElementById('navLinks');
    const drawerLinksContainer = document.getElementById('drawerLinks');
    [navLinksContainer, drawerLinksContainer].forEach(container => {
      if (!container) return;
      container.querySelectorAll('a').forEach(a => {
        a.classList.toggle('active', a.getAttribute('href') === '#' + id);
      });
    });
  }

  function getActiveSectionId() {
    const sections = document.querySelectorAll('.section, #about');
    const scrollY = window.scrollY;
    const offset = 150;
    let activeId = 'hero';

    sections.forEach(section => {
      const rect = section.getBoundingClientRect();
      const top = rect.top + scrollY;
      if (scrollY + offset >= top) {
        activeId = section.id;
      }
    });

    if (scrollY < 200) {
      activeId = 'hero';
    }

    return activeId;
  }

  let scrollTicking = false;
  window.addEventListener('scroll', () => {
    if (!scrollTicking) {
      requestAnimationFrame(() => {
        setActiveNav(getActiveSectionId());
        scrollTicking = false;
      });
      scrollTicking = true;
    }
  }, { passive: true });

  setActiveNav('hero');
}

function navigateToSection(targetId) {
  const target = document.querySelector(targetId);
  if (!target) return;

  const navLinksContainer = document.getElementById('navLinks');
  const drawerLinksContainer = document.getElementById('drawerLinks');
  [navLinksContainer, drawerLinksContainer].forEach(container => {
    if (!container) return;
    container.querySelectorAll('a').forEach(a => {
      a.classList.toggle('active', a.getAttribute('href') === targetId);
    });
  });

  target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function setupDrawer() {

  const overlay = document.getElementById('drawerOverlay');
  const closeBtn = document.getElementById('drawerClose');

function setupScrollProgress() {
  const bar = document.getElementById('scrollProgress');
  if (!bar) return;
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        bar.style.width = progress + '%';
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
}

function setupBackToTop() {
  const btn = document.getElementById('backToTop');
  if (!btn) return;
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        if (window.scrollY > 600) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });

  btn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
}

function initAmbientEffects() {
  const glow = document.getElementById('cursorGlow');
  const gridOverlay = document.getElementById('gridOverlay');
  const ambientCanvas = document.getElementById('ambientCanvas');
  if (!glow || !gridOverlay || !ambientCanvas) return;

  const ctx = ambientCanvas.getContext('2d');
  let width, height;
  let mouseX = -9999, mouseY = -9999;
  let targetMouseX = -9999, targetMouseY = -9999;
  let glowX = -9999, glowY = -9999;
  let mouseOnScreen = false;
  let gridMx = 50, gridMy = 50;
  const isMobile = window.innerWidth <= 768;
  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // --- Bezier curve path system ---
  // Each entity (particle or blob) follows a cubic bezier path.
  // When it reaches the end, a new bezier is generated from the current position.

  function randomPt() {
    return { x: Math.random() * width, y: Math.random() * height };
  }

  function generateBezierPath(startX, startY) {
    // Control points spread around the start, creating smooth curves
    const spread = Math.min(width, height) * 0.35;
    return {
      p0: { x: startX, y: startY },
      p1: { x: startX + (Math.random() - 0.5) * spread, y: startY + (Math.random() - 0.5) * spread },
      p2: { x: startX + (Math.random() - 0.5) * spread * 1.5, y: startY + (Math.random() - 0.5) * spread * 1.5 },
      p3: { x: startX + (Math.random() - 0.5) * spread * 2, y: startY + (Math.random() - 0.5) * spread * 2 },
      t: 0,
      speed: Math.random() * 0.0008 + 0.0003  // very slow: 0.0003-0.0011 per frame
    };
  }

  function cubicBezier(t, p0, p1, p2, p3) {
    const mt = 1 - t;
    const mt2 = mt * mt;
    const mt3 = mt2 * mt;
    const t2 = t * t;
    const t3 = t2 * t;
    return {
      x: mt3 * p0.x + 3 * mt2 * t * p1.x + 3 * mt * t2 * p2.x + t3 * p3.x,
      y: mt3 * p0.y + 3 * mt2 * t * p1.y + 3 * mt * t2 * p2.y + t3 * p3.y
    };
  }

  // Particles
  const PARTICLE_COUNT = isMobile ? 35 : 90;
  let particles = [];

  // Flowing gradient blobs
  const BLOB_COUNT = isMobile ? 2 : 4;
  let blobs = [];

  function resize() {
    width = ambientCanvas.width = window.innerWidth;
    height = ambientCanvas.height = window.innerHeight;
  }

  function createParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const start = randomPt();
      particles.push({
        x: start.x,
        y: start.y,
        path: generateBezierPath(start.x, start.y),
        // Mouse repulsion velocity
        vx: 0,
        vy: 0,
        radius: Math.random() * 1.6 + 0.5,
        baseOpacity: Math.random() * 0.35 + 0.12,
        opacity: 0,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.008 + 0.003
      });
    }
  }

  function createBlobs() {
    blobs = [];
    const hues = [30, 35, 40, 25];
    for (let i = 0; i < BLOB_COUNT; i++) {
      const start = randomPt();
      blobs.push({
        x: start.x,
        y: start.y,
        path: generateBezierPath(start.x, start.y),
        radius: Math.random() * 200 + 150,
        hue: hues[i % hues.length],
        baseOpacity: Math.random() * 0.025 + 0.01,
        opacity: 0,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.003 + 0.001
      });
    }
  }

  let pageVisible = true;
  document.addEventListener('visibilitychange', () => { pageVisible = !document.hidden; });

  function animate() {
    if (!pageVisible) {
      requestAnimationFrame(animate);
      return;
    }

    // Smooth mouse interpolation (frozen when mouse leaves screen)
    if (mouseOnScreen) {
      if (mouseX < 0) { mouseX = targetMouseX; mouseY = targetMouseY; glowX = targetMouseX; glowY = targetMouseY; }
      mouseX += (targetMouseX - mouseX) * 0.06;
      mouseY += (targetMouseY - mouseY) * 0.06;
      glowX += (targetMouseX - glowX) * 0.03;
      glowY += (targetMouseY - glowY) * 0.03;
    }

    // Update big glow div position (desktop)
    if (!isMobile) {
      glow.style.left = glowX + 'px';
      glow.style.top = glowY + 'px';
    }

    // Smooth grid overlay position
    const targetGridMx = mouseOnScreen ? (targetMouseX / window.innerWidth * 100) : 50;
    const targetGridMy = mouseOnScreen ? (targetMouseY / window.innerHeight * 100) : 50;
    gridMx += (targetGridMx - gridMx) * 0.04;
    gridMy += (targetGridMy - gridMy) * 0.04;
    gridOverlay.style.setProperty('--grid-mx', gridMx.toFixed(1) + '%');
    gridOverlay.style.setProperty('--grid-my', gridMy.toFixed(1) + '%');

    ctx.clearRect(0, 0, width, height);

    // --- Update and draw blobs (behind everything) ---
    blobs.forEach(b => {
      // Advance along bezier path
      b.path.t += b.path.speed;
      if (b.path.t >= 1) {
        // Generate new path from current endpoint
        const endPt = b.path.p3;
        b.path = generateBezierPath(endPt.x, endPt.y);
      }

      // Get bezier position
      const pos = cubicBezier(b.path.t, b.path.p0, b.path.p1, b.path.p2, b.path.p3);

      // Mouse attraction: blobs gently pulled toward cursor
      if (mouseOnScreen) {
        const mdx = mouseX - pos.x;
        const mdy = mouseY - pos.y;
        const mdist = Math.sqrt(mdx * mdx + mdy * mdy);
        if (mdist > 0 && mdist < 500) {
          const mforce = (500 - mdist) / 500 * 0.02;
          pos.x += mdx * mforce;
          pos.y += mdy * mforce;
        }
      }

      b.x = pos.x;
      b.y = pos.y;

      // Pulse
      b.pulse += b.pulseSpeed;
      b.opacity = b.baseOpacity + Math.sin(b.pulse) * 0.008;

      // Wrap if too far off screen
      if (b.x < -b.radius * 2) b.x = width + b.radius;
      if (b.x > width + b.radius * 2) b.x = -b.radius;
      if (b.y < -b.radius * 2) b.y = height + b.radius;
      if (b.y > height + b.radius * 2) b.y = -b.radius;

      // Draw blob
      const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.radius);
      grad.addColorStop(0, `hsla(${b.hue}, 55%, 55%, ${Math.max(0, b.opacity)})`);
      grad.addColorStop(0.5, `hsla(${b.hue}, 45%, 45%, ${Math.max(0, b.opacity * 0.4)})`);
      grad.addColorStop(1, `hsla(${b.hue}, 35%, 35%, 0)`);
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
    });

    // --- Draw connection lines between nearby particles ---
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          const alpha = (1 - dist / 120) * 0.1;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(220,185,120,${alpha})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // --- Update and draw particles ---
    particles.forEach(p => {
      // Advance along bezier path
      p.path.t += p.path.speed;
      if (p.path.t >= 1) {
        const endPt = p.path.p3;
        p.path = generateBezierPath(endPt.x, endPt.y);
      }

      // Get bezier position
      const pos = cubicBezier(p.path.t, p.path.p0, p.path.p1, p.path.p2, p.path.p3);

      // Mouse repulsion: push away from cursor
      if (mouseOnScreen) {
        const dx = pos.x - mouseX;
        const dy = pos.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 0 && dist < 160) {
          const force = (160 - dist) / 160;
          p.vx += (dx / dist) * force * 0.5;
          p.vy += (dy / dist) * force * 0.5;
        }
      }

      // Apply repulsion velocity with damping
      p.vx *= 0.92;
      p.vy *= 0.92;

      p.x = pos.x + p.vx;
      p.y = pos.y + p.vy;

      // Soft wrap
      if (p.x < -50) { p.x = width + 40; p.path = generateBezierPath(p.x, p.y); }
      if (p.x > width + 50) { p.x = -40; p.path = generateBezierPath(p.x, p.y); }
      if (p.y < -50) { p.y = height + 40; p.path = generateBezierPath(p.x, p.y); }
      if (p.y > height + 50) { p.y = -40; p.path = generateBezierPath(p.x, p.y); }

      // Pulse opacity
      p.pulse += p.pulseSpeed;
      p.opacity = p.baseOpacity + Math.sin(p.pulse) * 0.08;

      // Draw particle
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(220,185,120,${Math.max(0, p.opacity)})`;
      ctx.fill();
    });

    // Draw mouse attraction ring (only when mouse on screen)
    if (mouseOnScreen) {
      const ringRadius = 120;
      const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, ringRadius);
      gradient.addColorStop(0, 'rgba(220,185,120,0.05)');
      gradient.addColorStop(1, 'rgba(220,185,120,0)');
      ctx.beginPath();
      ctx.arc(mouseX, mouseY, ringRadius, 0, Math.PI * 2);
      ctx.fillStyle = gradient;
      ctx.fill();
    }

    requestAnimationFrame(animate);
  }

  // Mouse/touch tracking
  function updateMouse(x, y) {
    targetMouseX = x;
    targetMouseY = y;
    if (!mouseOnScreen) {
      mouseOnScreen = true;
    }
  }

  document.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
  document.addEventListener('touchmove', (e) => {
    const touch = e.touches[0];
    updateMouse(touch.clientX, touch.clientY);
  }, { passive: true });

  document.addEventListener('mouseleave', () => {
    mouseOnScreen = false;
    targetMouseX = -9999;
    targetMouseY = -9999;
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      resize();
      // Regenerate paths for new dimensions
      particles.forEach(p => { p.path = generateBezierPath(p.x, p.y); });
      blobs.forEach(b => { b.path = generateBezierPath(b.x, b.y); });
    }, 250);
  });

  if (reducedMotion) {
    glow.style.display = 'none';
    gridOverlay.style.display = 'none';
    return;
  }

  resize();
  createParticles();
  createBlobs();
  animate();
}

document.addEventListener('DOMContentLoaded', () => {
  const yearEl = document.getElementById('currentYear');
  if (yearEl) yearEl.textContent = new Date().getFullYear();
  initHeroCanvas();
  initAmbientEffects();
  renderProjects();
  setupCarousels();
  setupNavigation();
  setupDrawer();
  setupScrollProgress();
  setupBackToTop();

  document.querySelectorAll('[data-nav-link]').forEach(link => {
    link.addEventListener('click', (e) => {
      const href = link.getAttribute('href');
      if (href && href.startsWith('#')) {
        e.preventDefault();
        navigateToSection(href);
      }
    });
  });
});
</script>
</body>
