<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地批量重命名工具</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #0f1b31;
      --text: #e8eefc;
      --muted: #a8b3cf;
      --line: #223055;
      --btn: #2a66ff;
      --danger: #ff4d4f;
      --ok: #23c26b;
      --warn: #f5a524;
      --accent: #00d2ff;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #070c16, var(--bg));
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    /* Header */
    header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(11,18,32,.9);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header .tips {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Main Layout */
    main {
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px;
    }

    /* Card Panel */
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .card-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header .title {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header .icon { font-size: 18px; }
    .card-header .badge {
      background: linear-gradient(90deg, var(--accent), #3a7bd5);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .card-body { 
  padding: 14px; 
  position: relative; 
  overflow: hidden;
}

    /* Drop Zone */
    .drop-zone {
    border: 2px dashed rgba(255,255,255,.25);
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all .2s ease;
    background: rgba(0,0,0,.15);
    position: relative;
    display: block; 
    width: 100%; 
    box-sizing: border-box;
    }
    .drop-zone:hover {
    border-color: rgba(255,255,255,.4);
    background: rgba(255,255,255,.03);
    }
    .drop-zone:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
    }
    .drop-zone.dragover {
    border-color: var(--accent);
    background: rgba(0,210,255,.08);
    }
    .drop-zone .upload-icon { font-size: 36px; margin-bottom: 8px; }
    .drop-zone .main-text { font-weight: 600; font-size: 13px; }
    .drop-zone .sub-text { font-size: 12px; color: var(--muted); margin-top: 4px; }
    input[type="file"] {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;      
      cursor: pointer;
      display: block;
      z-index: 2;
    }


    .drop-zone > *:not(input[type="file"]) {
      position: relative;
      z-index: 1;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    button {
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(42,102,255,.85), rgba(42,102,255,.6));
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all .15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.secondary { background: rgba(255,255,255,.08); }
    button.danger { background: linear-gradient(180deg, rgba(255,77,79,.85), rgba(255,77,79,.6)); }
    button.success { background: linear-gradient(180deg, rgba(35,194,107,.85), rgba(35,194,107,.6)); }
    button.active { outline: 2px solid var(--accent); outline-offset: -2px; }
    button.reversed { background: linear-gradient(180deg, rgba(245,165,36,.85), rgba(245,165,36,.6)); }

    /* File List */
    .file-list {
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(0,0,0,.12);
    }
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      font-size: 12px;
      color: var(--muted);
    }
    .list-items {
      max-height: 320px;
      overflow-y: auto;
    }
    .list-items::-webkit-scrollbar { width: 6px; }
    .list-items::-webkit-scrollbar-track { background: rgba(255,255,255,.05); }
    .list-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,.2); border-radius: 3px; }

    .file-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      transition: background .15s;
      cursor: grab;
    }
    .file-item:hover { background: rgba(255,255,255,.04); }
    .file-item:last-child { border-bottom: none; }
    .file-item.dragging { opacity: .5; background: rgba(0,210,255,.1); }

    .file-index {
      background: rgba(0,210,255,.15);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 11px;
      font-family: var(--mono);
      min-width: 28px;
      text-align: center;
    }
    .file-icon { font-size: 20px; }
    .file-info { flex: 1; min-width: 0; }
    .file-name {
      font-size: 12px;
      word-break: break-all;
      line-height: 1.4;
    }
    .file-size {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }
    .file-thumb {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,.1);
    }
    .remove-btn {
      background: transparent;
      border: none;
      color: var(--danger);
      padding: 4px 8px;
      font-size: 14px;
      opacity: .6;
      cursor: pointer;
    }
    .remove-btn:hover { opacity: 1; background: transparent; }
    .move-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 2px 6px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 0;
      line-height: 1;
    }
    .move-btn:hover { color: var(--accent); }
    .move-btn span { display: block; }

    /* Text Area & Form */
    textarea {
      width: 100%;
      min-height: 180px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(0,0,0,.2);
      color: var(--text);
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
      font-family: var(--sans);
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,210,255,.15);
    }
    textarea::placeholder { color: rgba(255,255,255,.35); }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .field {
      background: rgba(0,0,0,.12);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 10px;
      padding: 10px;
    }
    .field.full { grid-column: 1 / -1; }
    .field label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input[type="text"], input[type="number"], select {
      width: 100%;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(0,0,0,.2);
      color: var(--text);
      padding: 8px 10px;
      font-size: 12px;
      font-family: var(--mono);
      outline: none;
    }
    input:focus, select:focus {
      border-color: var(--accent);
    }
    select option { background: #1a1a2e; }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
    }
    .checkbox-item input { width: 16px; height: 16px; cursor: pointer; }

    /* Status Box */
    .status-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.12);
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }
    .status-box .label { color: var(--accent); font-weight: 500; }
    .ok { color: var(--ok); }
    .warn { color: var(--warn); }
    .err { color: var(--danger); }

    /* Preview Items */
    .preview-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      border-left: 3px solid transparent;
    }
    .preview-item.ok { border-left-color: var(--ok); }
    .preview-item.err { border-left-color: var(--danger); background: rgba(255,77,79,.05); }
    .preview-item:last-child { border-bottom: none; }
    .preview-info { flex: 1; min-width: 0; }
    .new-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--accent);
      word-break: break-all;
    }
    .old-name {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .error-msg {
      font-size: 11px;
      color: var(--danger);
      margin-top: 2px;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: linear-gradient(90deg, var(--accent), #3a7bd5);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      transition: transform .3s ease;
      z-index: 1000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.warn { background: linear-gradient(90deg, #f5a524, #ff6b35); }
    .toast.error { background: linear-gradient(90deg, #ff4d4f, #ff7875); }

    /* Progress Overlay */
    .progress-overlay {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      background: rgba(0,0,0,.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      opacity: 0;
      visibility: hidden;
      transition: all .3s;
    }
    .progress-overlay.show { opacity: 1; visibility: visible; }
    .progress-bar {
      width: 280px;
      height: 8px;
      background: rgba(255,255,255,.15);
      border-radius: 4px;
      overflow: hidden;
      margin: 16px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #3a7bd5);
      width: 0%;
      transition: width .2s;
    }
    .progress-text { font-size: 14px; color: white; }

    /* Hints */
    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
      padding: 10px;
      background: rgba(245,165,36,.08);
      border: 1px solid rgba(245,165,36,.2);
      border-radius: 8px;
    }
    .hint strong { color: var(--warn); }

    /* Responsive */
    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; }
      .list-items { max-height: 240px; }
    }
  </style>
</head>
<body>

<header>
  <h1>📁 本地批量重命名工具</h1>
  <div class="tips">导入文件 → 输入新名字（每行一个） → 实时预览 → 下载 ZIP</div>
</header>

<main>
  <div class="grid">
    <!-- 左侧：文件导入 -->
    <section class="card">
      <div class="card-header">
        <div class="title"><span class="icon">📂</span> 原始文件</div>
        <span class="badge" id="fileCount">0 个</span>
      </div>
      <div class="card-body">
        <label class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="选择或拖拽文件上传">
          <div class="upload-icon">📤</div>
          <div class="main-text">拖拽文件到这里 或 点击选择</div>
          <div class="sub-text">支持任意类型文件，可多选</div>
          <input type="file" id="fileInput" multiple>
        </label>

        <div class="btn-row">
          <button type="button" class="danger" id="btnClear" disabled>🗑️ 清空</button>
          <button type="button" class="secondary" id="btnSortName" disabled>🔤 按名称排序</button>
          <button type="button" class="secondary" id="btnSortTime" disabled>🕐 按添加顺序</button>
        </div>

        <div class="file-list">
          <div class="list-header">
            <span>文件列表（可拖拽排序）</span>
            <span id="totalSize">0 B</span>
          </div>
          <div class="list-items" id="fileList">
            <div style="padding:30px;text-align:center;color:var(--muted)">暂无文件</div>
          </div>
        </div>
      </div>
    </section>

    <!-- 中间：规则设置 -->
    <section class="card">
      <div class="card-header">
        <div class="title"><span class="icon">✏️</span> 重命名规则</div>
        <span class="badge" id="lineCount">0 行</span>
      </div>
      <div class="card-body">
        <textarea id="namesInput" placeholder="每行输入一个新名字（不含扩展名）&#10;例如：&#10;张三&#10;李四&#10;王五"></textarea>

        <div class="form-grid">
          <div class="field">
            <label>命名模式</label>
            <select id="renameMode">
              <option value="replace">完全替换</option>
              <option value="prefix">添加前缀</option>
              <option value="suffix">添加后缀</option>
            </select>
          </div>
          <div class="field">
            <label>冲突处理</label>
            <select id="conflictMode">
              <option value="suffix">自动加 (1)(2)…</option>
              <option value="error">遇到重复报错</option>
            </select>
          </div>
          <div class="field">
            <label>起始序号</label>
            <input type="number" id="startIndex" value="1" min="0">
          </div>
          <div class="field">
            <label>序号位数（补零）</label>
            <input type="number" id="padWidth" value="0" min="0">
          </div>
          <div class="field">
            <label>分隔符</label>
            <input type="text" id="separator" value="_">
          </div>
          <div class="field">
            <label>&nbsp;</label>
            <button type="button" class="secondary" id="btnSwap" style="width:100%" disabled>🔄 反向匹配</button>
          </div>
          <div class="field full">
            <label>选项</label>
            <div class="checkbox-group">
              <label class="checkbox-item"><input type="checkbox" id="keepExt" checked> 保留扩展名</label>
              <label class="checkbox-item"><input type="checkbox" id="lowerExt" checked> 扩展名小写</label>
              <label class="checkbox-item"><input type="checkbox" id="trimLines" checked> 去首尾空格</label>
              <label class="checkbox-item"><input type="checkbox" id="skipEmpty" checked> 跳过空行</label>
              <label class="checkbox-item"><input type="checkbox" id="autoNumber"> 追加序号</label>
            </div>
          </div>
        </div>

        <div class="status-box" id="statusBox">
          <div><span class="label">状态：</span><span id="statusText">等待导入文件…</span></div>
          <div><span class="label">匹配：</span><span id="matchInfo">-</span></div>
        </div>

        <div class="hint">
          <strong>💡 提示：</strong>每行文字按顺序对应左侧文件。名字不够时用原文件名补齐，多余的行将忽略。(不推荐重命名大型文件!)
        </div>
      </div>
    </section>

    <!-- 右侧：预览结果 -->
    <section class="card">
      <div class="card-header">
        <div class="title"><span class="icon">👁️</span> 预览结果</div>
        <span class="badge" id="previewCount">0 个</span>
      </div>
      <div class="card-body">
        <div class="btn-row">
          <button type="button" class="success" id="btnDownloadZip" disabled>📦 下载 ZIP</button>
          <button type="button" class="secondary" id="btnDownloadCSV" disabled>📋 下载对照表</button>
        </div>

        <div class="file-list">
          <div class="list-header">
            <span>重命名预览</span>
            <span id="previewSize">0 B</span>
          </div>
          <div class="list-items" id="previewList">
            <div style="padding:30px;text-align:center;color:var(--muted)">输入名字后自动预览</div>
          </div>
        </div>

        <div class="hint">
          下载的 ZIP 内含重命名后的文件及对照表 CSV。
        </div>
      </div>
    </section>
  </div>
</main>

<div class="toast" id="toast"></div>
<div class="progress-overlay" id="progressOverlay">
  <div class="progress-text" id="progressText">打包中…</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressDetail">0 / 0</div>
</div>

<script src="https://gcore.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
// ===== 工具函数 =====
const formatBytes = (b) => {
  const u = ['B','KB','MB','GB'];
  let i = 0, v = b;
  while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
  return (i === 0 ? v : v.toFixed(2)) + ' ' + u[i];
};

const getExt = (name) => {
  const i = name.lastIndexOf('.');
  return i > 0 ? name.slice(i) : '';
};

const stripExt = (name) => {
  const i = name.lastIndexOf('.');
  return i > 0 ? name.slice(0, i) : name;
};

const escapeHtml = (s) => {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
};

const sanitize = (s) => {
  let x = (s ?? '').toString();
  x = x.replace(/[\u0000-\u001f\u007f]/g, '');
  x = x.replace(/[\\/:*?"<>|]/g, ' ');
  x = x.replace(/\s+/g, ' ').trim().replace(/[. ]+$/g, '');
  // 检查 Windows 保留文件名
  const reserved = /^(CON|PRN|AUX|NUL|COM[1-9]|LPT[1-9])(\.|$)/i;
  if (reserved.test(x)) x = x + '_';
  return x || 'untitled';
};

const padNum = (n, w) => String(n).padStart(w > 0 ? w : 0, '0');

const csvEscape = (v) => {
  const s = String(v ?? '');
  return /[",\n\r]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
};

const getFileIcon = (name) => {
  const ext = getExt(name).replace(/^\./, '').toLowerCase();
  const icons = {
    jpg:'🖼️', jpeg:'🖼️', png:'🖼️', gif:'🖼️', webp:'🖼️', bmp:'🖼️', svg:'🖼️',
    pdf:'📄', doc:'📝', docx:'📝', txt:'📃', xls:'📊', xlsx:'📊', csv:'📊',
    ppt:'📽️', pptx:'📽️', zip:'🗜️', rar:'🗜️', '7z':'🗜️',
    mp3:'🎵', wav:'🎵', mp4:'🎬', avi:'🎬', mkv:'🎬',
    js:'💻', html:'💻', css:'💻', py:'💻', exe:'⚙️'
  };
  return icons[ext] || '📄';
};


const isImage = (file) => /^image\//.test(file.type) || /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(file.name);

const naturalCompare = (a, b) => {
  const ax = [], bx = [];
  a.replace(/(\d+)|(\D+)/g, (_, $1, $2) => { ax.push([$1 || Infinity, $2 || '']); return ''; });
  b.replace(/(\d+)|(\D+)/g, (_, $1, $2) => { bx.push([$1 || Infinity, $2 || '']); return ''; });
  while (ax.length && bx.length) {
    const an = ax.shift(), bn = bx.shift();
    const nn = (an[0] - bn[0]) || an[1].localeCompare(bn[1], 'zh-CN');
    if (nn) return nn;
  }
  return ax.length - bx.length;
};

// ===== 状态 =====
let files = [];
let originalOrder = [];
let orderMode = 'picked';
let reverseMatch = false;
let generated = [];
const urlCache = new Map();

// ===== DOM =====
const $ = (id) => document.getElementById(id);
const dropZone = $('dropZone');
const fileInput = $('fileInput');
const fileList = $('fileList');
const previewList = $('previewList');
const namesInput = $('namesInput');


// ===== 事件：导入 =====
function resetFileInputValue() {
  fileInput.value = '';
}

dropZone.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    resetFileInputValue();
    fileInput.click();
  }
});

fileInput.addEventListener('change', (e) => {
  const list = e.target.files;
  if (list && list.length) addFiles(Array.from(list));
  resetFileInputValue();
});

['dragover', 'dragenter'].forEach(evt => {
  dropZone.addEventListener(evt, (e) => {
    e.preventDefault();
    if (dragIdx !== null) return; 
    dropZone.classList.add('dragover');
  });
});
['dragleave', 'drop'].forEach(evt => {
  dropZone.addEventListener(evt, () => dropZone.classList.remove('dragover'));
});
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  e.stopPropagation();
  if (dragIdx !== null) return; 
  const dt = e.dataTransfer;
  if (dt && dt.files && dt.files.length) addFiles(Array.from(dt.files));
});

function addFiles(newFiles) {
  const existed = new Set(files.map(f => `${f.name}__${f.size}__${f.lastModified}`));
  const toAdd = [];

  for (const f of newFiles) {
    const key = `${f.name}__${f.size}__${f.lastModified}`;
    if (!existed.has(key)) {
      existed.add(key);
      toAdd.push(f);
    }
  }

  if (toAdd.length === 0) {
    showToast('未添加：可能选择了重复文件', 'warn');
    return;
  }

  originalOrder = originalOrder.concat(toAdd);
  if (orderMode === 'picked') {
    files = [...originalOrder];
  } else {
    files = files.concat(toAdd);
  }
  applyOrder();
  renderFiles();
  updatePreview();
  showToast(`已添加 ${toAdd.length} 个文件`);
}

function applyOrder() {
  if (orderMode === 'name') {
    files.sort((a, b) => naturalCompare(a.name, b.name));
  } else if (orderMode === 'picked') {
    files = [...originalOrder];
  }
}

function getObjectUrl(file) {
  if (!urlCache.has(file)) urlCache.set(file, URL.createObjectURL(file));
  return urlCache.get(file);
}

function clearUrls() {
  urlCache.forEach(url => URL.revokeObjectURL(url));
  urlCache.clear();
} 


// ===== 渲染左侧文件列表 =====
function renderFiles() {
  const total = files.reduce((s, f) => s + (f.size || 0), 0);

  if (files.length === 0) {
    fileList.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted)">暂无文件</div>';
  } else {
    fileList.innerHTML = files.map((f, i) => {
      const thumb = isImage(f) 
        ? `<img class="file-thumb" src="${getObjectUrl(f)}" alt="">` 
        : `<span class="file-icon">${getFileIcon(f.name)}</span>`;
      return `
        <div class="file-item" draggable="true" data-idx="${i}">
          <span class="file-index">${i + 1}</span>
          ${thumb}
          <div class="file-info">
            <div class="file-name">${escapeHtml(f.name)}</div>
            <div class="file-size">${formatBytes(f.size)}</div>
          </div>
          <button type="button" class="move-btn" data-action="up" data-idx="${i}" title="上移" draggable="false">▲</button>
          <button type="button" class="move-btn" data-action="down" data-idx="${i}" title="下移" draggable="false">▼</button>
          <button type="button" class="remove-btn" data-action="remove" data-idx="${i}" draggable="false">✕</button>
        </div>
      `;
    }).join('');
    initDragSort();
  }
  $('fileCount').textContent = `${files.length} 个`;
  $('totalSize').textContent = formatBytes(total);
  updateButtons();
  updateSortButtonStates();
}

function removeFile(i) {
  const removed = files.splice(i, 1)[0];
  if (removed && urlCache.has(removed)) {
    URL.revokeObjectURL(urlCache.get(removed));
    urlCache.delete(removed);
  }
  const oi = originalOrder.indexOf(removed);
  if (oi !== -1) originalOrder.splice(oi, 1);
  renderFiles();
  updatePreview();
}

function moveFile(i, dir) {
  const target = i + dir;
  if (target < 0 || target >= files.length) return;
  const [moved] = files.splice(i, 1);
  files.splice(target, 0, moved);
  // 同步 originalOrder：找到 moved 在 originalOrder 中的位置，
  // 以及 target 位置处的文件在 originalOrder 中的位置，将 moved 移到其前面/后面
  const oi = originalOrder.indexOf(moved);
  if (oi !== -1) {
    originalOrder.splice(oi, 1);
    const targetFile = files[target];
    const ti = targetFile ? originalOrder.indexOf(targetFile) : originalOrder.length;
    if (ti !== -1) {
      const insertPos = dir < 0 ? ti : ti + 1;
      originalOrder.splice(Math.min(insertPos, originalOrder.length), 0, moved);
    } else {
      originalOrder.push(moved);
    }
  }
  renderFiles();
  updatePreview();
}

// ===== 拖拽排序（事件委托） =====
let dragIdx = null;

// 只初始化一次事件委托
let dragSortInited = false;
function initDragSort() {
  if (dragSortInited) return;
  dragSortInited = true;

  fileList.addEventListener('dragstart', (e) => {
    const item = e.target.closest('.file-item');
    if (!item) return;
    dragIdx = +item.dataset.idx;
    item.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  fileList.addEventListener('dragend', (e) => {
    const item = e.target.closest('.file-item');
    if (item) item.classList.remove('dragging');
    dragIdx = null;
  });
  // 按钮点击委托
  fileList.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const action = btn.dataset.action;
    const idx = +btn.dataset.idx;
    if (action === 'remove') removeFile(idx);
    else if (action === 'up') moveFile(idx, -1);
    else if (action === 'down') moveFile(idx, 1);
  });
  fileList.addEventListener('dragover', (e) => {
    const item = e.target.closest('.file-item');
    if (!item) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  });
  fileList.addEventListener('drop', (e) => {
    const item = e.target.closest('.file-item');
    if (!item) return;
    e.preventDefault();
    const toIdx = +item.dataset.idx;
    if (dragIdx !== null && dragIdx !== toIdx) {
      const [moved] = files.splice(dragIdx, 1);
      files.splice(toIdx, 0, moved);
      // 同步 originalOrder：将 moved 移到 toIdx 位置文件在 originalOrder 中的相邻位置
      const oi = originalOrder.indexOf(moved);
      if (oi !== -1) {
        originalOrder.splice(oi, 1);
        const anchorFile = files[toIdx];
        const ai = anchorFile ? originalOrder.indexOf(anchorFile) : -1;
        if (ai !== -1) {
          originalOrder.splice(ai, 0, moved);
        } else {
          originalOrder.push(moved);
        }
      }
      renderFiles();
      updatePreview();
    }
  });
}

// ===== 获取新名字行 =====
function getNameLines() {
  let lines = namesInput.value.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  if ($('trimLines').checked) lines = lines.map(s => s.trim());
  if ($('skipEmpty').checked) lines = lines.filter(s => s.length > 0);
  return lines;
}

// ===== 自动预览 =====
function updatePreview() {
  const lines = getNameLines();
  $('lineCount').textContent = `${lines.length} 行`;

  if (files.length === 0) {
    $('statusText').textContent = '等待导入文件…';
    $('matchInfo').textContent = '-';
    previewList.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted)">输入名字后自动预览</div>';
    $('previewCount').textContent = '0 个';
    $('previewSize').textContent = '0 B';
    $('btnDownloadZip').disabled = true;
    $('btnDownloadCSV').disabled = true;
    return;
  }

  const mode = $('renameMode').value;
  const start = Math.max(0, parseInt($('startIndex').value) || 1);
  const width = Math.max(0, parseInt($('padWidth').value) || 0);
  const sep = $('separator').value;
  const keepExt = $('keepExt').checked;
  const lowerExt = $('lowerExt').checked;
  const autoNum = $('autoNumber').checked;
  const conflict = $('conflictMode').value;

  const idxs = [...files.keys()];
  if (reverseMatch) idxs.reverse();

  const result = [];
  const usedNames = new Set();
  const usedKey = (n) => n.toLowerCase();
  let total = 0;

  for (let k = 0; k < idxs.length; k++) {
    const i = idxs[k];
    const file = files[i];
    total += file.size || 0;

    const ext = keepExt ? getExt(file.name) : '';
    const extFinal = lowerExt ? ext.toLowerCase() : ext;
    const origBase = sanitize(stripExt(file.name));

    let base = '';
    const lineText = lines[k] ?? '';
    const hasLine = k < lines.length && lineText.length > 0;

    if (mode === 'replace') {
      base = hasLine ? sanitize(lineText) : origBase;
    } else if (mode === 'prefix') {
      base = hasLine ? sanitize(lineText) + sep + origBase : origBase;
    } else if (mode === 'suffix') {
      base = hasLine ? origBase + sep + sanitize(lineText) : origBase;
    }

    if (autoNum) {
      base += sep + padNum(start + i, width);
    }

    let newName = base + extFinal;

    if (usedNames.has(usedKey(newName))) {
      if (conflict === 'error') {
        result.push({ file, oldName: file.name, newName, ok: false, err: `重名: ${newName}` });
        continue;
      } else {
        let n = 1;
        while (usedNames.has(usedKey(`${base}(${n})${extFinal}`))) n++;
        newName = `${base}(${n})${extFinal}`;
      }
    }
    usedNames.add(usedKey(newName));
    result.push({ file, oldName: file.name, newName, ok: true, err: '' });
  }

  generated = result;
  renderPreview(total);

  const okCount = result.filter(x => x.ok).length;
  const used = Math.min(files.length, lines.length);
  $('matchInfo').textContent = `${used} / ${files.length} 行已匹配${reverseMatch ? '（反向）' : ''}`;
  $('statusText').innerHTML = `成功 <span class="ok">${okCount}</span>，失败 <span class="err">${result.length - okCount}</span>`;
  $('btnDownloadZip').disabled = okCount === 0;
  $('btnDownloadCSV').disabled = result.length === 0;
}

function renderPreview(total) {
  if (generated.length === 0) {
    previewList.innerHTML = '<div style="padding:30px;text-align:center;color:var(--muted)">输入名字后自动预览</div>';
  } else {
    previewList.innerHTML = generated.map((g, i) => `
      <div class="preview-item ${g.ok ? 'ok' : 'err'}">
        <span class="file-index">${i + 1}</span>
        <span class="file-icon">${getFileIcon(g.newName)}</span>
        <div class="preview-info">
          <div class="new-name">${escapeHtml(g.newName)}</div>
          <div class="old-name">原: ${escapeHtml(g.oldName)}</div>
          ${g.err ? `<div class="error-msg">${escapeHtml(g.err)}</div>` : ''}
        </div>
      </div>
    `).join('');
  }
  $('previewCount').textContent = `${generated.length} 个`;
  $('previewSize').textContent = formatBytes(total);
}

// ===== 按钮状态 =====
function updateButtons() {
  const has = files.length > 0;
  $('btnClear').disabled = !has;
  $('btnSortName').disabled = !has;
  $('btnSortTime').disabled = !has;
  $('btnSwap').disabled = !has;
}

function updateSortButtonStates() {
  $('btnSortName').classList.toggle('active', orderMode === 'name');
  $('btnSortTime').classList.toggle('active', orderMode === 'picked' && files.length > 0);
}

// ===== 控制按钮 =====
$('btnClear').addEventListener('click', () => {
  files = [];
  originalOrder = [];
  generated = [];
  orderMode = 'picked';
  reverseMatch = false;
  namesInput.value = '';
  clearUrls();
  renderFiles();
  updatePreview();
  updateSwapButtonState();
  updateSortButtonStates();
  showToast('已清空');
});

$('btnSortName').addEventListener('click', () => {
  orderMode = 'name';
  applyOrder();
  renderFiles();
  updatePreview();
  showToast('已按名称排序');
});

$('btnSortTime').addEventListener('click', () => {
  orderMode = 'picked';
  applyOrder();
  renderFiles();
  updatePreview();
  showToast('已按添加顺序');
});

function updateSwapButtonState() {
  const btn = $('btnSwap');
  if (reverseMatch) {
    btn.classList.add('reversed');
    btn.textContent = '🔄 反向匹配 (已启用)';
  } else {
    btn.classList.remove('reversed');
    btn.textContent = '🔄 反向匹配';
  }
}

$('btnSwap').addEventListener('click', () => {
  reverseMatch = !reverseMatch;
  updateSwapButtonState();
  updatePreview();
  showToast(reverseMatch ? '已启用反向匹配' : '已恢复正向匹配');
});

// ===== 实时预览事件 =====
namesInput.addEventListener('input', updatePreview);
// select 和 checkbox 只绑定 change 事件（避免双重触发），text/number 只绑定 input 事件
['renameMode', 'conflictMode'].forEach(id => {
  $(id).addEventListener('change', updatePreview);
});
['startIndex', 'padWidth'].forEach(id => {
  $(id).addEventListener('input', updatePreview);
});
['keepExt', 'lowerExt', 'trimLines', 'skipEmpty', 'autoNumber'].forEach(id => {
  $(id).addEventListener('change', updatePreview);
});
$('separator').addEventListener('change', updatePreview);

$('startIndex').addEventListener('blur', () => {
  const v = parseInt($('startIndex').value);
  const corrected = isNaN(v) || v < 0 ? 1 : v;
  if (corrected !== parseInt($('startIndex').value)) {
    $('startIndex').value = corrected;
    updatePreview();
  }
});
$('padWidth').addEventListener('blur', () => {
  const v = parseInt($('padWidth').value);
  const corrected = isNaN(v) || v < 0 ? 0 : v;
  if (corrected !== parseInt($('padWidth').value)) {
    $('padWidth').value = corrected;
    updatePreview();
  }
});

$('separator').addEventListener('input', () => {
  const el = $('separator');
  el.value = el.value.replace(/[\\/:*?"<>|]/g, '');
  updatePreview();
});

// ===== 下载 ZIP =====
$('btnDownloadZip').addEventListener('click', async () => {
  const okItems = generated.filter(x => x.ok);
  if (!okItems.length) return;
  if (typeof JSZip === 'undefined') { showToast('JSZip 未加载', 'error'); return; }

  $('btnDownloadZip').disabled = true;
  showProgress(true);

  $('progressText').textContent = '打包中…';
  $('progressFill').style.width = '0%';
  $('progressDetail').textContent = `0 / ${okItems.length}`;

  try {
    const blob = await generateZipBlobSafe(okItems);

    downloadBlobSafe(blob, `batch_renamed_${Date.now()}.zip`);
    showToast(`已下载 ${okItems.length} 个文件`);
  } catch (e) {
    console.error(e);
    showToast('打包失败：文件过大或浏览器内存不足（建议减少文件数量/改用电脑）', 'error');
  } finally {
    showProgress(false);
    $('btnDownloadZip').disabled = false;
  }
});
// ===== 下载 CSV =====
$('btnDownloadCSV').addEventListener('click', () => {
  if (!generated.length) return;
  const csv = ['index,oldName,newName,status,error'].concat(
    generated.map((it, i) => [i + 1, csvEscape(it.oldName), csvEscape(it.newName), it.ok ? 'OK' : 'ERR', csvEscape(it.err)].join(','))
  ).join('\n');
  downloadBlobSafe(new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }), `rename_map_${Date.now()}.csv`);
});

async function generateZipBlobSafe(okItems) {
  try {
    return await generateZipBlob(okItems, {
      compression: 'DEFLATE',
      compressionOptions: { level: 1 },
    });
  } catch (e) {
    console.warn('[zip] DEFLATE failed, fallback to STORE', e);
    return await generateZipBlob(okItems, {
      compression: 'STORE',
      compressionOptions: undefined,
    });
  }
}

async function generateZipBlob(okItems, zipOptions) {
  if (typeof JSZip === 'undefined') throw new Error('JSZip 未加载');

  const zip = new JSZip();
  const folder = zip.folder('重命名后的文件');

  for (const item of okItems) {
    folder.file(item.newName, item.file, {
      createFolders: true,
    });
  }

  const csv = ['index,oldName,newName,sizeBytes'].concat(
    okItems.map((it, idx) => [idx + 1, csvEscape(it.oldName), csvEscape(it.newName), it.file.size].join(','))
  ).join('\n');
  folder.file('_rename_map.csv', '\uFEFF' + csv);

  const blob = await zip.generateAsync(
    {
      type: 'blob',
      streamFiles: true,
      compression: zipOptions.compression,
      compressionOptions: zipOptions.compressionOptions,
    },
    (metadata) => {
      const pct = Number(metadata.percent) || 0;
      $('progressFill').style.width = pct.toFixed(2) + '%';
      $('progressDetail').textContent = metadata.currentFile
        ? `处理中：${metadata.currentFile}`
        : `处理中… ${pct.toFixed(0)}%`;
    }
  );

  return blob;
}

function downloadBlobSafe(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;

  document.body.appendChild(a);

  a.click();

  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 60_000);
}

// ===== Toast =====
let toastTimer = null;
function showToast(msg, type = 'success') {
  const t = $('toast');
  if (toastTimer) clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'toast show' + (type !== 'success' ? ' ' + type : '');
  toastTimer = setTimeout(() => {
    t.classList.remove('show');
    toastTimer = null;
  }, 3000);
}

// ===== Progress =====
function showProgress(show) {
  $('progressOverlay').classList.toggle('show', show);
}

// 初始化
updateButtons();
updateSwapButtonState();
</script>
