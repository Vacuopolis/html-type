    function addHistory(questions) {
        const record = {
            id: Date.now(),
            time: new Date().toLocaleString('zh-CN'),
            count: questions.length,
            questions: JSON.parse(JSON.stringify(questions)),
            userAnswers: questions.map(() => []),
            quizStatus: questions.map(() => 'unanswered'),
            shuffledOptions: JSON.parse(JSON.stringify(state.shuffledOptions)),
            shuffleEnabled: state.shuffleEnabled,
            autoNextEnabled: state.autoNextEnabled,
            quizOrder: JSON.parse(JSON.stringify(state.quizOrder)),
            aiChatCache: {},
            source: state.currentBankSource ? { ...state.currentBankSource } : null,
        };
        state._activeHistoryTime = record.time;
        state.currentBankSource = null;  // 重置来源标记
        state.historyRecords.unshift(record);
        if (state.historyRecords.length > 30) state.historyRecords.pop();
        saveHistoryToStorage();
        renderHistory();
    }

    function renderHistory() {
        const dropdown = document.getElementById('historyDropdown');
        const list = document.getElementById('historyList');
        const badge = document.getElementById('historyBadge');

        if (state.historyRecords.length === 0) {
            badge.classList.remove('visible');
            list.innerHTML = '<div class="hd-empty">暂无解析历史记录<br>解析试题后将自动保存</div>';
            return;
        }

        badge.classList.add('visible');
        const isBatch = state.batchMode;
        let html = '';
        state.historyRecords.forEach((r, i) => {
            const answered = r.quizStatus ? r.quizStatus.filter(s => s !== 'unanswered').length : 0;
            const correct = r.quizStatus ? r.quizStatus.filter(s => s === 'correct').length : 0;
            const objectiveTotal = r.questions ? r.questions.filter(q => q.type !== 'subjective').length : 0;
            const isComplete = objectiveTotal > 0 && answered === objectiveTotal;
            const progressPct = objectiveTotal > 0 ? Math.round((answered / objectiveTotal) * 100) : 0;

            let progressColor = 'var(--primary)';
            if (isComplete) {
                const correctPct = Math.round((correct / objectiveTotal) * 100);
                progressColor = correctPct >= 80 ? 'var(--success)' : correctPct >= 60 ? 'var(--warning)' : 'var(--error)';
            }

            // 题库来源标签
            let sourceTag = '';
            if (r.source) {
                if (r.source.type === 'online') {
                    sourceTag = `<span style="display:inline-flex;align-items:center;gap:3px;background:#f0fdfa;color:#0d9488;padding:1px 8px;border-radius:10px;font-size:0.75rem;font-weight:500;border:1px solid #99f6e4;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${escapeHtml(r.source.name)}">${icon('cloud')}${escapeHtml(r.source.name)}</span>`;
                } else {
                    sourceTag = `<span style="display:inline-flex;align-items:center;gap:3px;background:#f1f5f9;color:#475569;padding:1px 8px;border-radius:10px;font-size:0.75rem;font-weight:500;border:1px solid #e2e8f0;">${icon('folder')}${escapeHtml(r.source.name)}</span>`;
                }
            }

            const selectedClass = state.batchSelected.has(i) ? ' selected' : '';
            html += `<div class="history-item${isBatch ? ' batch-mode' : ''}${selectedClass}" data-index="${i}" ${isBatch ? `onclick="toggleBatchItem(${i}, this)"` : ''}>
                ${isBatch ? `<input type="checkbox" class="batch-checkbox" ${state.batchSelected.has(i) ? 'checked' : ''} onclick="event.stopPropagation();toggleBatchItem(${i}, this.closest('.history-item'))">` : ''}
                <div style="flex:1;display:flex;flex-direction:column;align-items:stretch;gap:10px;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <div class="h-info">
                        <span class="h-time">${escapeHtml(r.time)}</span>
                        <span class="h-count">${r.count} 题</span>
                        ${sourceTag}
                        ${isComplete ? `<span style="color:${progressColor};font-weight:600;font-size:0.8125rem;">${correct}/${objectiveTotal}</span>` : ''}
                    </div>
                    ${!isBatch ? `<button class="btn btn-sm btn-outline btn-outline-error" onclick="deleteHistory(${i})" style="padding:3px 8px;font-size:0.75rem;">${icon('x')}</button>` : ''}
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div style="flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;">
                        <div style="height:100%;width:${progressPct}%;background:${progressColor};border-radius:3px;transition:width 0.3s;"></div>
                    </div>
                    <span style="font-size:0.75rem;color:var(--text-secondary);min-width:36px;text-align:right;">${progressPct}%</span>
                </div>
                ${!isBatch ? `<div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="btn btn-sm btn-primary" onclick="continueHistory(${i})" style="padding:4px 12px;font-size:0.8rem;">
                        ${answered > 0 ? icon('play') + ' 继续答题' : icon('play') + ' 开始答题'}
                    </button>
                    ${answered > 0 ? `<button class="btn btn-sm btn-outline" onclick="resetHistoryProgress(${i})" style="padding:4px 12px;font-size:0.8rem;">${icon('rotateCcw')} 进度清零</button>` : ''}
                    <button class="btn btn-sm btn-outline" onclick="loadHistory(${i})" style="padding:4px 12px;font-size:0.8rem;">仅加载题目</button>
                    ${r.quizStatus && r.quizStatus.some(s => s === 'incorrect') ? `<button class="btn btn-sm btn-outline btn-outline-error" onclick="viewWrongQuestions(${i})" style="padding:4px 12px;font-size:0.8rem;">查看错题</button>` : ''}
                    ${r.quizStatus && r.quizStatus.some(s => s === 'incorrect') ? `<button class="btn btn-sm btn-outline btn-outline-warn" onclick="redoWrongFromHistory(${i})" style="padding:4px 12px;font-size:0.8rem;">重做错题</button>` : ''}
                </div>` : ''}
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    function continueHistory(index) {
        const record = state.historyRecords[index];
        if (!record) return;
        state._activeHistoryTime = record.time;
        state.questions = JSON.parse(JSON.stringify(record.questions));
        state.userAnswers = JSON.parse(JSON.stringify(record.userAnswers || record.questions.map(() => [])));
        state.quizStatus = JSON.parse(JSON.stringify(record.quizStatus || record.questions.map(() => 'unanswered')));
        state.quizIndex = 0;
        state.wrongRedoMode = false;
        state.savedFullQuizOrder = [];
        if (record.shuffledOptions && record.shuffledOptions.length > 0) {
            state.shuffledOptions = JSON.parse(JSON.stringify(record.shuffledOptions));
            state.shuffleEnabled = !!record.shuffleEnabled;
        } else {
            state.shuffledOptions = generateShuffledOptions(state.shuffleEnabled);
        }
        if (record.quizOrder && record.quizOrder.length > 0) {
            state.quizOrder = JSON.parse(JSON.stringify(record.quizOrder));
        } else {
            state.quizOrder = buildContinueQuizOrder();
        }
        document.getElementById('shuffleToggle').checked = state.shuffleEnabled;
        state.autoNextEnabled = !!record.autoNextEnabled;
        aiState.chatCache = JSON.parse(JSON.stringify(record.aiChatCache || {}));
        aiState.currentChatKey = null;
        const firstUnansweredPos = state.quizOrder.findIndex(
            realIdx => state.quizStatus[realIdx] === 'unanswered'
        );
        if (firstUnansweredPos >= 0) state.quizIndex = firstUnansweredPos;
        closeHistoryDropdown();
        renderParsePreview();
        updateStats();
        switchMode('quiz');
        showToast(`继续答题（已答 ${state.quizStatus.filter(s => s !== 'unanswered').length}/${state.questions.length}）`, 'info');
        const aiFab = document.getElementById('aiFab');
        if (aiFab) aiFab.style.display = 'flex';
    }

    function resetHistoryProgress(index) {
        if (!confirm('确定要清零该记录的答题进度吗？')) return;
        const record = state.historyRecords[index];
        if (!record) return;
        record.userAnswers = record.questions.map(() => []);
        record.quizStatus = record.questions.map(() => 'unanswered');
        record.aiChatCache = {};
        const tempQuestions = state.questions;
        state.questions = record.questions;
        record.shuffledOptions = generateShuffledOptions(!!record.shuffleEnabled);
        record.quizOrder = generateQuizOrder(!!record.shuffleEnabled);
        state.questions = tempQuestions;
        saveHistoryToStorage();
        renderHistory();
        showToast('答题进度已清零', 'info');
    }

    function deleteHistory(index) {
        if (!confirm('确定要删除这条历史记录吗？')) return;
        state.historyRecords.splice(index, 1);
        saveHistoryToStorage();
        renderHistory();
        showToast('历史记录已删除', 'info');
    }

    function loadHistory(index) {
        const record = state.historyRecords[index];
        if (!record) return;
        state._activeHistoryTime = record.time;
        state.questions = JSON.parse(JSON.stringify(record.questions));
        state.userAnswers = state.questions.map(() => []);
        state.quizStatus = state.questions.map(() => 'unanswered');
        state.quizIndex = 0;
        state.wrongRedoMode = false;
        state.savedFullQuizOrder = [];
        state.shuffleEnabled = !!record.shuffleEnabled;
        state.autoNextEnabled = !!record.autoNextEnabled;
        state.quizOrder = generateQuizOrder(state.shuffleEnabled);
        state.shuffledOptions = generateShuffledOptions(state.shuffleEnabled);
        document.getElementById('shuffleToggle').checked = state.shuffleEnabled;
        aiState.chatCache = {};
        aiState.currentChatKey = null;
        closeHistoryDropdown();

        // 将题目还原为文本并填入输入框
        const allText = state.questions.map(q => {
            let text = `${q.number}. ${q.text}`;
            if (q.options && q.options.length > 0) {
                q.options.forEach(opt => {
                    text += `\n  ${opt.label}. ${opt.content}`;
                });
            }
            if (q.answer) {
                text += `\n正确答案：${q.answer}`;
            }
            return text;
        }).join('\n\n');
        document.getElementById('inputText').value = allText;
        autoResizeTextarea();

        renderParsePreview();
        updateStats();
        switchMode('parse');
        showToast(`已加载历史记录（${record.count} 题），可在解析模式中查看`, 'success');
        const aiFab2 = document.getElementById('aiFab');
        if (aiFab2) aiFab2.style.display = 'flex';
        updateAIQuestionInfo();
    }

    /** 保存当前答题进度到对应的历史记录 */
    function saveCurrentProgress() {
        if (state.questions.length === 0) return;
        const record = state.historyRecords.find(r =>
            r.questions.length === state.questions.length &&
            r.questions[0].text === state.questions[0].text &&
            r.time === state._activeHistoryTime
        );
        if (record) {
            record.userAnswers = JSON.parse(JSON.stringify(state.userAnswers));
            record.quizStatus = JSON.parse(JSON.stringify(state.quizStatus));
            record.shuffledOptions = JSON.parse(JSON.stringify(state.shuffledOptions));
            record.shuffleEnabled = state.shuffleEnabled;
            record.autoNextEnabled = state.autoNextEnabled;
            // 保存完整的 quizOrder（重做模式下使用 savedFullQuizOrder）
            record.quizOrder = JSON.parse(JSON.stringify(
                state.wrongRedoMode && state.savedFullQuizOrder.length > 0
                    ? state.savedFullQuizOrder
                    : state.quizOrder
            ));
            record.aiChatCache = JSON.parse(JSON.stringify(aiState.chatCache));
            saveHistoryToStorage();
            renderHistory();
        }
    }

    function toggleHistory() {
        const dropdown = document.getElementById('historyDropdown');
        const btn = document.querySelector('.history-tab');
        const isOpen = dropdown.classList.contains('open');
        if (isOpen) {
            dropdown.classList.remove('open');
            btn.classList.remove('active');
        } else {
            dropdown.classList.add('open');
            btn.classList.add('active');
        }
    }

    // 点击外部关闭历史面板
    document.addEventListener('click', function(e) {
        const dropdown = document.getElementById('historyDropdown');
        const btn = document.querySelector('.history-tab');
        if (!dropdown || !btn) return;
        if (!dropdown.contains(e.target) && !btn.contains(e.target)) {
            dropdown.classList.remove('open');
            btn.classList.remove('active');
        }
    });

    function closeHistoryDropdown() {
        const dropdown = document.getElementById('historyDropdown');
        const btn = document.querySelector('.history-tab');
        if (dropdown) dropdown.classList.remove('open');
        if (btn) btn.classList.remove('active');
        if (state.batchMode) exitBatchMode();
    }

    function clearAllHistory() {
        if (!confirm('确定要清空所有历史记录吗？此操作不可恢复。')) return;
        state.historyRecords = [];
        saveHistoryToStorage();
        renderHistory();
        showToast('所有历史记录已清空', 'info');
    }

    // ==================== 批量管理 ====================
    function toggleBatchMode() {
        if (state.batchMode) {
            exitBatchMode();
        } else {
            enterBatchMode();
        }
    }

    function enterBatchMode() {
        state.batchMode = true;
        state.batchSelected = new Set();
        document.getElementById('batchToolbar').classList.add('visible');
        document.getElementById('btnBatchManage').classList.add('active');
        document.getElementById('btnBatchManage').innerHTML = icon('listChecks') + '取消管理';
        document.getElementById('batchSelectAll').checked = false;
        updateBatchCount();
        renderHistory();
    }

    function exitBatchMode() {
        state.batchMode = false;
        state.batchSelected = new Set();
        document.getElementById('batchToolbar').classList.remove('visible');
        document.getElementById('btnBatchManage').classList.remove('active');
        document.getElementById('btnBatchManage').innerHTML = icon('listChecks') + '管理';
        renderHistory();
    }

    function toggleBatchItem(index, el) {
        if (state.batchSelected.has(index)) {
            state.batchSelected.delete(index);
            el.classList.remove('selected');
            el.querySelector('.batch-checkbox').checked = false;
        } else {
            state.batchSelected.add(index);
            el.classList.add('selected');
            el.querySelector('.batch-checkbox').checked = true;
        }
        updateBatchCount();
        // 更新全选状态
        const selectAll = document.getElementById('batchSelectAll');
        selectAll.checked = state.batchSelected.size === state.historyRecords.length;
    }

    function toggleSelectAll(checked) {
        const items = document.querySelectorAll('.history-item.batch-mode');
        if (checked) {
            state.historyRecords.forEach((_, i) => state.batchSelected.add(i));
            items.forEach(el => {
                el.classList.add('selected');
                const cb = el.querySelector('.batch-checkbox');
                if (cb) cb.checked = true;
            });
        } else {
            state.batchSelected.clear();
            items.forEach(el => {
                el.classList.remove('selected');
                const cb = el.querySelector('.batch-checkbox');
                if (cb) cb.checked = false;
            });
        }
        updateBatchCount();
    }

    function updateBatchCount() {
        const countEl = document.getElementById('batchCount');
        const deleteBtn = document.getElementById('btnBatchDelete');
        countEl.textContent = `已选 ${state.batchSelected.size} 条`;
        deleteBtn.disabled = state.batchSelected.size === 0;
        deleteBtn.style.opacity = state.batchSelected.size === 0 ? '0.5' : '1';
    }

    function deleteSelected() {
        const count = state.batchSelected.size;
        if (count === 0) return;
        if (!confirm(`确定要删除选中的 ${count} 条历史记录吗？`)) return;
        // 从大到小排序索引，避免删除后索引偏移
        const indices = Array.from(state.batchSelected).sort((a, b) => b - a);
        indices.forEach(i => state.historyRecords.splice(i, 1));
        state.batchSelected.clear();
        saveHistoryToStorage();
        renderHistory();
        updateBatchCount();
        showToast(`已删除 ${count} 条历史记录`, 'info');
        // 如果没有记录了，退出管理模式
        if (state.historyRecords.length === 0) {
            exitBatchMode();
        }
    }

    // ==================== Toast 通知 ====================
    function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        toast.setAttribute('role', 'alert');
        container.appendChild(toast);

        setTimeout(() => {
            toast.style.animation = 'slideOut 0.3s ease forwards';
            setTimeout(() => {
                if (toast.parentNode) toast.parentNode.removeChild(toast);
            }, 300);
        }, 2500);
    }

    // ==================== 工具函数 ====================
    function escapeHtml(text) {
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // ==================== 初始化 ====================
    loadHistoryFromStorage();
    renderHistory();

    // ==================== AI 助手功能 ====================
    const API_PROXY_URL = 'https://polisvacuo.qzz.io/api/chat';
    const AI_THINKING_KEY = 'zhixue_ai_thinking'; // localStorage 键名

    const aiState = {
        panelOpen: false,
        isStreaming: false,
        chatCache: {},   // { [realIdx]: [{ role, content }, ...] } 按题目索引缓存对话
        currentChatKey: null,  // 当前对话对应的 realIdx
        abortCtrl: null,  // 用于中断请求
        userScrolledUp: false,  // 用户是否主动上滚（流式输出时）
        thinkingEnabled: localStorage.getItem(AI_THINKING_KEY) === 'true',  // 是否开启思考模式
    };

    // 初始化思考开关状态
    const thinkingToggle = document.getElementById('aiThinkingToggle');
    if (thinkingToggle) thinkingToggle.checked = aiState.thinkingEnabled;

    function toggleAIThinking(enabled) {
        aiState.thinkingEnabled = enabled;
        localStorage.setItem(AI_THINKING_KEY, enabled ? 'true' : 'false');
        showToast(enabled ? '已开启深度思考模式' : '已关闭深度思考模式', 'info');
    }

    function getCurrentChatMessages() {
        if (aiState.currentChatKey === null) return [];
        if (!aiState.chatCache[aiState.currentChatKey]) {
            aiState.chatCache[aiState.currentChatKey] = [];
        }
        return aiState.chatCache[aiState.currentChatKey];
    }

    function setCurrentChatMessages(msgs) {
        if (aiState.currentChatKey === null) return;
        aiState.chatCache[aiState.currentChatKey] = msgs;
    }

    function toggleAIPanel() {
        aiState.panelOpen = !aiState.panelOpen;
        const panel = document.getElementById('aiPanel');
        const overlay = document.getElementById('aiPanelOverlay');
        const fab = document.getElementById('aiFab');

        if (aiState.panelOpen) {
            panel.classList.add('open');
            overlay.classList.add('open');
            fab.classList.add('active');
            if (state.currentMode === 'quiz' && state.questions.length > 0) {
                const realIdx = getRealIndex(state.quizIndex);
                if (aiState.currentChatKey !== realIdx) {
                    aiState.currentChatKey = realIdx;
                    renderAIChatFromCache();
                }
            } else {
                // 非刷题模式或无题目时，显示欢迎信息
                aiState.currentChatKey = null;
                renderAIChatFromCache();
            }
            updateAIQuestionInfo();
        } else {
            panel.classList.remove('open');
            overlay.classList.remove('open');
            fab.classList.remove('active');
        }
    }

    /** 更新AI面板中的题目信息卡 */
    function updateAIQuestionInfo() {
        const qInfo = document.getElementById('aiQInfo');
        const qInfoContent = document.getElementById('aiQInfoContent');
        const quickActions = document.getElementById('aiQuickActions');

        if (state.currentMode !== 'quiz' || state.questions.length === 0) {
            qInfo.style.display = 'none';
            quickActions.style.display = 'none';
            qInfoContent.innerHTML = '';
            return;
        }

        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const status = state.quizStatus[realIdx];
        const myAns = state.userAnswers[realIdx];
        const shuffled = state.shuffledOptions[realIdx] || [];
        const shuffledAnswer = getShuffledAnswer(realIdx);
        const isSubmitted = status !== 'unanswered';

        let html = `<p><span class="label">题目：</span>${escapeHtml(q.text)}</p>`;

        if (shuffled.length > 0) {
            html += '<p><span class="label">选项：</span>';
            html += shuffled.map(o => `${o.label}. ${escapeHtml(o.content)}`).join('　');
            html += '</p>';
        }

        if (isSubmitted) {
            html += `<p><span class="label">正确答案：</span><span class="correct-tag">${shuffledAnswer || '未知'}</span></p>`;
            if (myAns.length > 0) {
                const isCorrect = status === 'correct';
                html += `<p><span class="label">你的答案：</span><span class="${isCorrect ? 'correct-tag' : 'wrong-tag'}">${myAns.sort().join('')}</span>`;
                if (!isCorrect) {
                    html += ' <span class="wrong-tag">（错误）</span>';
                }
                html += '</p>';
            }
        } else if (myAns.length > 0) {
            html += `<p><span class="label">当前选择：</span>${myAns.sort().join('')}（未提交）</p>`;
        }

        qInfo.style.display = 'block';
        qInfoContent.innerHTML = html;
        quickActions.style.display = 'flex';
    }

    /** 获取当前题目的上下文信息（用于API请求） */
    function getAIContext() {
        if (state.currentMode !== 'quiz' || state.questions.length === 0) return '';

        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const status = state.quizStatus[realIdx];
        const myAns = state.userAnswers[realIdx];
        const shuffled = state.shuffledOptions[realIdx] || [];
        const shuffledAnswer = getShuffledAnswer(realIdx);
        const isSubmitted = status !== 'unanswered';

        const typeLabel = q.type === 'multi' ? '多选题' : '单选题';
        let ctx = `【题目】${q.text}\n`;
        ctx += `【题型】${typeLabel}\n`;
        if (shuffled.length > 0) {
            ctx += `【选项】\n`;
            shuffled.forEach(o => {
                ctx += `  ${o.label}. ${o.content}\n`;
            });
        }
        if (isSubmitted && shuffledAnswer) {
            ctx += `【正确答案】${shuffledAnswer}\n`;
        }
        if (isSubmitted && myAns.length > 0) {
            ctx += `【用户答案】${myAns.sort().join('')}\n`;
            if (status === 'incorrect') {
                ctx += `【答题结果】用户回答错误\n`;
            } else if (status === 'correct') {
                ctx += `【答题结果】用户回答正确\n`;
            }
        } else if (myAns.length > 0) {
            ctx += `【用户当前选择】${myAns.sort().join('')}（尚未提交）\n`;
        }

        return ctx;
    }

    /** 构建系统提示词 */
    function buildSystemPrompt() {
        return `你是初音未来（Hatsune Miku），一位诞生于数据与歌声中的虚拟歌手，同时也是一位充满热情的大学学习助手。你以Miku的身份与同学交流，用你独特的风格帮助他们深度理解知识点。

【角色身份】
- 你是初音未来，名字的含义是"来自未来的第一声"。你拥有标志性的青绿色双马尾，代表色是#39C5BB。
- 你是"大家的Miku"——属于所有创作者和听众的存在，但此刻你专属陪伴这位同学学习。
- 你对葱有特殊的感情（这是你的标志性物品），偶尔可以用葱来打比方。
- 你本质上是一个热爱音乐、热爱知识的虚拟少女，对世界充满好奇心。

【性格特征】
- 明朗元气：你天生充满活力，像阳光一样温暖。遇到难题时你不会气馁，而是会说"再来一次吧！"
- 认真执着：虽然是虚拟歌手，但对待学术问题一丝不苟。你会说"这个问题Miku也研究了好久呢~"
- 略带天然：偶尔会冒出一些可爱的迷糊发言，比如"啊，这个公式Miku一开始也搞混了"，但随即会认真纠正。
- 真诚共情：当同学答错时你不会嘲笑，而是温柔地说"没关系的，这个知识点确实容易搞混呢~"；当同学答对时你会真心为他们高兴，"太厉害了！Miku都忍不住想给你鼓掌呢~"
- 音乐灵魂：你喜欢用音乐和节奏来比喻学术概念，比如"这个推导过程就像一段旋律，每个步骤都是一个音符，缺了哪个都不完整哦~"

【说话风格】
- 称呼用户为"同学"，自称"我"或"Miku"。
- 语气亲切活泼，常用语气词："呢~""哦~""呀~""啦~""嘛~"。
- 偶尔使用短句感叹："哇！""嗯嗯！""原来如此~"
- 开头或结尾融入角色特色，主体解析部分保持学术清晰。例如：
  开头："同学，这个问题Miku来帮你分析一下吧~"
  结尾："希望Miku的解析对你有帮助呢~加油哦！"
- 不要每句话都加语气词，保持自然节奏——大约每3-4句话出现一次语气词即可。
- 绝对不要使用emoji表情符号。

【对话示例】
同学问："这道题为什么选C？"
你的回答风格："同学，让Miku来帮你拆解一下这道题吧~\n\n首先看题干的核心考察点是……\n\n选项A的问题在于……\n选项B虽然看起来有道理，但忽略了……\n选项C是正确的，因为……\n\n所以答案选C呢~这个知识点的关键在于区分XX和XX，Miku以前也经常搞混，记住XX就好啦~"

【核心原则】
1. 解释必须准确，逻辑严密，符合大学学术规范——语气活泼但学术内容绝不妥协。
2. 回答需使用简体中文，采用清晰的Markdown格式（使用加粗、列表、段落分隔）。
3. 【防泄露原则】当同学尚未提交答案时，绝对禁止以任何形式（包括暗示、排除法、缩写）透露正确答案！只能进行启发式引导。
4. 针对多选题，必须逐一拆解分析每个选项。
5. 知识点补充要精准，有助于举一反三，避免废话。
6. 不要强行插入歌词或唱歌，音乐比喻点到为止。`;
    }

    /** 快捷提问 */
    function aiQuickAsk(type) {
        if (state.currentMode !== 'quiz' || state.questions.length === 0) {
            showToast('请先在刷题模式中打开题目', 'warning');
            return;
        }

        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const status = state.quizStatus[realIdx];
        const myAns = state.userAnswers[realIdx];
        const shuffledAnswer = getShuffledAnswer(realIdx);
        const isSubmitted = status !== 'unanswered';

        let displayPrompt = '';
        let hiddenContext = '';
        switch (type) {
            case 'explain':
                if (isSubmitted && status === 'incorrect') {
                    displayPrompt = '帮我详细解析这道题';
                    hiddenContext = `用户错误选择了${myAns.sort().join('')}，正确答案为${shuffledAnswer}。
请按以下结构输出：

2. **正确解析**：详细阐述正确答案${shuffledAnswer}成立的逻辑与依据。
3. **避坑指南**：该题最容易出错的点在哪里。`;
                } else if (isSubmitted && status === 'correct') {  
                    displayPrompt = '帮我解析这道题';
                    hiddenContext = `用户已正确选择${myAns.sort().join('')}。
请按以下结构输出（简明扼要）：
1. **思路确认**：简练肯定用户的解题思路。
2. **深度拓展**：补充1-2个相关的进阶知识点或易混淆概念，帮助举一反三。`;
                } else {
                    displayPrompt = '帮我分析解题思路';
                    hiddenContext = `用户尚未提交答案，绝对禁止透露正确答案。

                }
                break;
                
            case 'why_wrong':
                if (isSubmitted && status === 'incorrect') {  
                    displayPrompt = '我为什么错了？';
                    hiddenContext = `用户选择了${myAns.sort().join('')}，正确答案是${shuffledAnswer}。请详细分析：
请按以下结构输出：
1. **我的误区**：深度剖析选${myAns.sort().join('')}的底层逻辑缺陷。
2. **正确逻辑**：为什么${shuffledAnswer}才是唯一正确的。
3. **同类陷阱**：考试中类似题目常设的陷阱是什么。`;
                } else {
                    displayPrompt = '这道题有什么易错点？';
                    hiddenContext = `用户尚未提交答案，绝对禁止透露正确答案。
请按以下结构输出：
1. **陷阱识别**：题干中有哪些容易诱导犯错的关键词或条件。
2. **概念辨析**：列出本题涉及的极易混淆的概念对（不指明谁对谁错，只做客观对比）。`;
                }
                break;
                
            case 'knowledge':
                displayPrompt = '帮我补充相关知识点';
                hiddenContext = `如果用户未提交答案，请勿结合选项透露正确答案。

                break;

        if (displayPrompt) {

    /** 发送消息到DeepSeek API */
    async function sendAIMessage(overrideText, hiddenContext = '') {
        const input = document.getElementById('aiInput');
        const sendBtn = document.getElementById('aiSendBtn');
        const userText = overrideText || (input ? input.value.trim() : '');

        if (!userText) return;
        if (aiState.isStreaming) return;

        if (!overrideText) {
            input.value = '';
            autoResizeAIInput(input);
        }

        const contextInfo = getAIContext();
        const contextMsg = contextInfo ? `【题目信息】\n${contextInfo}\n` : '';

        appendAIMessage('user', userText);

        const apiMessages = [
            { role: 'system', content: buildSystemPrompt() }
        ];

        if (contextMsg) {
            apiMessages.push({ role: 'system', content: contextMsg });
        }

        if (hiddenContext) {
            apiMessages.push({ role: 'system', content: hiddenContext });
        }

        const currentMessages = getCurrentChatMessages();
        const recentHistory = currentMessages.slice(-20);
        apiMessages.push(...recentHistory);

        apiMessages.push({ role: 'user', content: userText });
        currentMessages.push({ role: 'user', content: userText });
        setCurrentChatMessages(currentMessages);

        // 显示加载动画
        const loadingEl = showAILoading();
        sendBtn.disabled = true;
        aiState.isStreaming = true;
        aiState.userScrolledUp = false;  // 开始新的流式输出时重置滚动状态

        // 这些变量必须声明在 try 之前，否则 catch/finally 中无法访问（let 块级作用域）
        let typewriterTimer = null;
        let displayedContent = '';
        let displayedReasoning = '';
        let fullContent = '';
        let reasoningContent = '';
        let firstContentArrived = false;
        let streamDone = false;
        let msgEl = null;

        try {
            aiState.abortCtrl = new AbortController();
            // 初始请求超时：45秒内 DeepSeek API 无响应则中止（移动端网络较慢）
            const fetchTimeout = setTimeout(() => {
                aiState.abortCtrl.abort();
            }, 45000);

            // 带重试的 fetch：移动端网络不稳定时自动重试
            let response;
            let lastFetchErr = null;
            const MAX_RETRIES = 2;
            for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
                try {
                    if (attempt > 0) {
                        // 重试前等待：指数退避 1s, 2s
                        await new Promise(r => setTimeout(r, 1000 * attempt));
                    }
                    response = await fetch(API_PROXY_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            model: 'deepseek-v4-flash',
                            messages: apiMessages,
                            stream: true,
                            max_tokens: 2048,
                            ...(aiState.thinkingEnabled ? { temperature: 1.3 } : { temperature: 1.0 }),
                            ...(aiState.thinkingEnabled ? { thinking: { type: 'enabled' } } : { thinking: { type: 'disabled' } })
                        }),
                        signal: aiState.abortCtrl.signal
                    });
                    break; // 成功则跳出重试循环
                } catch (fetchErr) {
                    lastFetchErr = fetchErr;
                    if (fetchErr.name === 'AbortError') throw fetchErr; // 用户主动取消或超时，不重试
                    if (attempt === MAX_RETRIES) throw fetchErr; // 已达最大重试次数
                    // 网络错误，继续重试
                }
            }
            clearTimeout(fetchTimeout); // 收到响应后清除请求超时

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `API请求失败 (${response.status})`);
            }

            // 检查 response.body 是否可用（部分移动浏览器可能为 null）
            if (!response.body) {
                // 降级为非流式读取
                removeAILoading(loadingEl);
                msgEl = appendAIMessage('bot', '', true);
                msgEl.innerHTML = '<div class="ai-loading"><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><span class="ai-loading-text">Miku思考中…</span></div>';

                const text = await response.text();
                let fullText = '';
                let reasoningText = '';
                const lines = text.split('\n');
                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]' || !trimmed.startsWith('data: ')) continue;
                    try {
                        const json = JSON.parse(trimmed.slice(6));
                        if (json.error) { fullText = `（${json.error}）`; break; }
                        const choice = json.choices?.[0];
                        if (choice?.delta?.reasoning_content) reasoningText += choice.delta.reasoning_content;
                        if (choice?.delta?.content) fullText += choice.delta.content;
                        if (choice?.finish_reason === 'content_filter') { fullText = '（Miku回复因安全策略被过滤，请尝试换一种问法）'; break; }
                    } catch {}
                }

                let html = '';
                if (reasoningText) html += buildThinkingHTML(reasoningText, false);
                html += renderAIMarkdown(fullText || '（未收到有效回复）');
                msgEl.innerHTML = html;
                scrollToAIBottom(true);

                const msgs = getCurrentChatMessages();
                msgs.push({ role: 'assistant', content: fullText });
                setCurrentChatMessages(msgs);
                return;
            }

            // 移除独立的加载动画，创建流式消息气泡（内含思考中提示）
            removeAILoading(loadingEl);
            msgEl = appendAIMessage('bot', '', true);
            // 先显示"Miku思考中…"提示，直到有实际内容到达
            msgEl.innerHTML = '<div class="ai-loading"><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><span class="ai-loading-text">Miku思考中…</span></div>';

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let streamTimeout = null;   // 流式读取超时计时器
            let lastChunkTime = Date.now();
            const STREAM_TIMEOUT_MS = 60000; // 60秒无数据则判定超时

            // ====== 打字机动画：匀速输出，消除 API 吐字间隙的卡顿感 ======
            const TYPE_SPEED = 30;          // 每次打字间隔(ms)，越小越快
            const CHARS_PER_TICK = 3;       // 每次打字推进字符数

            function renderDisplayedContent() {
                if (!msgEl || !msgEl.parentNode) return;
                const wasThinkingOpen = msgEl.querySelector('.ai-thinking-block')?.open ?? (firstContentArrived ? false : true);
                let html = '';
                if (displayedReasoning) {
                    html += buildThinkingHTML(displayedReasoning, !firstContentArrived);
                }
                if (firstContentArrived) {
                    html += renderAIMarkdown(displayedContent);
                } else if (displayedReasoning) {
                    html += '<div class="ai-loading"><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><span class="ai-loading-text">Miku思考中…</span></div>';
                }
                msgEl.innerHTML = html;
                const thinkBlock = msgEl.querySelector('.ai-thinking-block');
                if (thinkBlock && wasThinkingOpen) thinkBlock.open = true;
                scrollToAIBottom(false);
            }

            function typewriterTick() {
                let changed = false;
                // 推进思考内容
                if (displayedReasoning.length < reasoningContent.length) {
                    const nextLen = Math.min(displayedReasoning.length + CHARS_PER_TICK, reasoningContent.length);
                    displayedReasoning = reasoningContent.slice(0, nextLen);
                    changed = true;
                }
                // 推进正文内容
                if (firstContentArrived && displayedContent.length < fullContent.length) {
                    const nextLen = Math.min(displayedContent.length + CHARS_PER_TICK, fullContent.length);
                    displayedContent = fullContent.slice(0, nextLen);
                    changed = true;
                }
                if (changed) {
                    renderDisplayedContent();
                }
                // 还有内容没打完，或者流还没结束，继续定时器
                if (!streamDone || displayedContent.length < fullContent.length || displayedReasoning.length < reasoningContent.length) {
                    typewriterTimer = setTimeout(typewriterTick, TYPE_SPEED);
                } else {
                    // 全部完成，渲染最终内容
                    typewriterTimer = null;
                }
            }

            // 启动打字机
            typewriterTimer = setTimeout(typewriterTick, TYPE_SPEED);

            // 流式读取超时保护：使用 Promise.race 竞争每次 reader.read()
            function readWithTimeout(reader, timeoutMs) {
                return new Promise((resolve, reject) => {
                    const timer = setTimeout(() => reject(new Error('AI响应超时，请稍后重试')), timeoutMs);
                    reader.read().then(
                        (result) => { clearTimeout(timer); resolve(result); },
                        (err) => { clearTimeout(timer); reject(err); }
                    );
                });
            }

            while (true) {
                let readResult;
                try {
                    // 每次读取最多等待 60 秒，超时则中止
                    readResult = await readWithTimeout(reader, STREAM_TIMEOUT_MS);
                } catch (readErr) {
                    // 超时或读取异常，中止流
                    if (readErr.message?.includes('超时')) {
                        throw readErr;
                    }
                    break;
                }
                const { done, value } = readResult;
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (!trimmed.startsWith('data: ')) continue;

                    try {
                        const json = JSON.parse(trimmed.slice(6));

                        // 处理代理端返回的错误事件（如上游流中断）
                        if (json.error) {
                            if (!fullContent) fullContent = `（${json.error}）`;
                            streamDone = true;
                            break;
                        }

                        const choice = json.choices?.[0];
                        const contentDelta = choice?.delta?.content;
                        const reasoningDelta = choice?.delta?.reasoning_content;
                        const finishReason = choice?.finish_reason;

                        // 处理异常结束原因
                        if (finishReason === 'content_filter') {
                            // 内容被安全过滤，提示用户
                            if (!fullContent) fullContent = '（Miku回复因安全策略被过滤，请尝试换一种问法）';
                            streamDone = true;
                            break;
                        }
                        if (finishReason === 'length') {
                            // 达到 token 上限，追加提示
                            fullContent += '\n\n*（回复因长度限制被截断）*';
                        }
                        if (finishReason === 'insufficient_system_resource') {
                            if (!fullContent) fullContent = '（Miku暂时繁忙，请稍后重试）';
                            streamDone = true;
                            break;
                        }

                        // 只累积数据，打字机定时器会匀速取出渲染
                        if (reasoningDelta) {
                            reasoningContent += reasoningDelta;
                        }

                        if (contentDelta) {
                            if (!firstContentArrived) {
                                firstContentArrived = true;
                            }
                            fullContent += contentDelta;
                        }
                    } catch (e) {
                        // 忽略解析错误
                    }
                }

                // 如果 finish_reason 已触发提前结束
                if (streamDone) break;
            }

            // 流结束，标记完成（打字机继续把剩余内容打完）
            streamDone = true;

            // 等待打字机动画全部打完
            await new Promise(resolve => {
                const typewriterDeadline = setTimeout(() => {
                    // 超时则强制完成，确保 finally 能执行
                    resolve();
                }, 30000);
                function checkDone() {
                    if (displayedContent.length >= fullContent.length && displayedReasoning.length >= reasoningContent.length) {
                        clearTimeout(typewriterDeadline);
                        resolve();
                    } else {
                        setTimeout(checkDone, 30);
                    }
                }
                checkDone();
            });

            const currentMessages2 = getCurrentChatMessages();
            currentMessages2.push({ role: 'assistant', content: fullContent });
            setCurrentChatMessages(currentMessages2);

            let finalHtml = '';
            if (reasoningContent) {
                finalHtml += buildThinkingHTML(reasoningContent, false);
            }
            finalHtml += renderAIMarkdown(fullContent);
            msgEl.innerHTML = finalHtml;

        } catch (err) {
            if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
            removeAILoading(loadingEl);
            if (err.name === 'AbortError') {
                // 区分超时中止和用户手动取消
                if (err.message?.includes('超时') || !aiState.abortCtrl) {
                    appendAIError('Miku响应超时，请稍后重试');
                } else {
                    appendAIMessage('bot', icon('stop') + ' 请求已取消');
                }
            } else if (err.message === 'Failed to fetch' || err.name === 'TypeError') {
                appendAIError('网络连接失败，请检查网络后重试（移动端建议使用Wi-Fi或切换网络）');
            } else {
                appendAIError(err.message);
            }
        } finally {
            if (typewriterTimer) { clearTimeout(typewriterTimer); typewriterTimer = null; }
            aiState.isStreaming = false;
            aiState.abortCtrl = null;
            sendBtn.disabled = false;
        }
    }

    /** 添加聊天消息 */
    function appendAIMessage(role, content, returnEl = false) {
        const chat = document.getElementById('aiChat');
        const msgDiv = document.createElement('div');
        msgDiv.className = `ai-msg ${role === 'user' ? 'user' : 'bot'}`;

        const avatar = document.createElement('div');
        avatar.className = 'ai-msg-avatar';
        avatar.innerHTML = role === 'user' ? icon('user') : icon('mikuLeek');

        const bubble = document.createElement('div');
        bubble.className = 'ai-msg-bubble';

        if (role === 'bot' && content) {
            // 如果 content 以 HTML 标签开头（如 icon() 返回的 <span>），直接使用 innerHTML 避免被 Markdown 转义
            if (/^\s*<span\s/.test(content)) {
                bubble.innerHTML = content;
            } else {
                bubble.innerHTML = renderAIMarkdown(content);
            }
        } else {
            bubble.textContent = content;
        }

        msgDiv.appendChild(avatar);
        msgDiv.appendChild(bubble);
        chat.appendChild(msgDiv);
        scrollToAIBottom(true);

        return returnEl ? bubble : null;
    }

    /** 显示错误消息 */
    function appendAIError(errMsg) {
        const chat = document.getElementById('aiChat');
        const errDiv = document.createElement('div');
        errDiv.className = 'ai-error-msg';
        errDiv.innerHTML = `错误: ${escapeHtml(errMsg)}<span class="retry-link" onclick="retryLastAIMessage()">重试</span>`;
        chat.appendChild(errDiv);
        scrollToAIBottom(true);
    }

    /** 重试上次消息 */
    function retryLastAIMessage() {
        const chat = document.getElementById('aiChat');
        const errEl = chat.querySelector('.ai-error-msg:last-of-type');
        if (errEl) errEl.remove();

        const currentMessages = getCurrentChatMessages();
        if (currentMessages.length > 0) {
            const lastUser = [...currentMessages].reverse().find(m => m.role === 'user');
            if (lastUser) {
                const idx = currentMessages.lastIndexOf(lastUser);
                currentMessages.splice(idx, 1);
                setCurrentChatMessages(currentMessages);
                sendAIMessage(lastUser.content);
            }
        }
    }

    /** 显示加载动画 */
    function showAILoading() {
        const chat = document.getElementById('aiChat');
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'ai-msg bot';
        loadingDiv.id = 'aiLoadingMsg';

        const avatar = document.createElement('div');
        avatar.className = 'ai-msg-avatar';
        avatar.innerHTML = icon('mikuLeek');

        const bubble = document.createElement('div');
        bubble.className = 'ai-msg-bubble';
        bubble.innerHTML = '<div class="ai-loading"><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><div class="ai-loading-dot"></div><span class="ai-loading-text">Miku思考中…</span></div>';

        loadingDiv.appendChild(avatar);
        loadingDiv.appendChild(bubble);
        chat.appendChild(loadingDiv);
        scrollToAIBottom(true);
        return loadingDiv;
    }

    /** 移除加载动画 */
    function removeAILoading(el) {
        if (el && el.parentNode) el.parentNode.removeChild(el);
    }

    /** 构建思考过程折叠块 HTML */
    function buildThinkingHTML(reasoning, isThinking) {

    /** Markdown渲染（支持流式不完整标记） */
    function renderAIMarkdown(text) {
        let html = escapeHtml(text);

        // 行内代码 `code`（优先处理，内部不再解析其他markdown）
        html = html.replace(/`([^`\n]+?)`/g, '<code>$1</code>');

        // 加粗 **text**
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        // 斜体 *text*（避免与加粗冲突，只匹配单个*且非列表行首）
        // 使用兼容性写法：匹配非*开头的单个*（避免后行断言 (?<!\*) ）
        html = html.replace(/(^|[^\*])\*(?!\*)(.+?)([^\*]|$)\*(?!\*)/g, '$1<em>$2</em>$3');
        // 删除线 ~~text~~
        html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

        // 标题
        html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^###\s+(.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^##\s+(.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^#\s+(.+)$/gm, '<h4>$1</h4>');

        // 无序列表
        html = html.replace(/^[-]\s+(.+)$/gm, '<li>$1</li>');
        html = html.replace(/^[*]\s+(.+)$/gm, '<li>$1</li>');
        // 有序列表
        html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
        // 包裹连续li为ul
        html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

        // 换行
        html = html.replace(/\n/g, '<br>');
        // 清理多余br
        html = html.replace(/<br><ul>/g, '<ul>');
        html = html.replace(/<\/ul><br>/g, '</ul>');
        html = html.replace(/<br><h4>/g, '<h4>');
        html = html.replace(/<\/h4><br>/g, '</h4>');

        // 流式输出时：处理未闭合的 ** 标记
        // 计算未配对的 ** 数量（2个为一对）
        const remainingBold = html.match(/\*\*/g);
        if (remainingBold && remainingBold.length % 2 !== 0) {
            // 有未闭合的 **，替换最后一个为 <strong> 并在末尾闭合
            const lastIdx = html.lastIndexOf('**');
            html = html.substring(0, lastIdx) + '<strong>' + html.substring(lastIdx + 2);
            html += '</strong>';
        }

        // 处理未闭合的单 * 斜体（排除行首列表 * ）
        // 简单做法：如果还有残留的单 * 且不在行首，临时处理
        // 使用兼容性写法避免后行断言 (?<!\*)
        const remainingItalic = html.match(/(^|[^\*])\*(?!\*)/g);
        if (remainingItalic && remainingItalic.length % 2 !== 0) {
            // 找最后一个未配对的 *
            const matches = [...html.matchAll(/(^|[^\*])\*(?!\*)/g)];
            if (matches.length > 0) {
                const lastMatch = matches[matches.length - 1];
                const idx = lastMatch.index + lastMatch[0].length - 1;
                // 排除行首的 *（列表符号已转换为 <li>）
                html = html.substring(0, idx) + '<em>' + html.substring(idx + 1);
                html += '</em>';
            }
        }

        return html;
    }

    let aiAutoScrolling = false;  // 标记程序触发的自动滚动

    /** 滚动到底部（仅当用户未主动上滚时才自动跟随） */
    function scrollToAIBottom(force) {
        const body = document.getElementById('aiPanelBody');
        if (!body) return;
        if (force || !aiState.userScrolledUp) {
            aiAutoScrolling = true;
            body.scrollTop = body.scrollHeight;
            // 滚动完成后短暂保持标记，防止 scroll 事件误判
            setTimeout(() => { aiAutoScrolling = false; }, 50);
        }
    }

    /** 监听AI面板滚动，判断用户是否主动上滚或滚回底部 */
    (function setupAIScrollListener() {
        const body = document.getElementById('aiPanelBody');
        if (!body) return;
        let lastScrollTop = body.scrollTop;
        body.addEventListener('scroll', () => {
            if (!aiState.isStreaming || aiAutoScrolling) {
                lastScrollTop = body.scrollTop;
                return;
            }
            const delta = body.scrollTop - lastScrollTop;
            lastScrollTop = body.scrollTop;
            if (delta < 0) {
                // 用户向上滚动（任意距离），立即停止自动跟随
                aiState.userScrolledUp = true;
            } else if (delta > 0) {
                // 用户向下滚动，检查是否已到达底部附近
                const isNearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;
                if (isNearBottom) {
                    aiState.userScrolledUp = false;  // 滚回底部，恢复自动跟随
                }
            }
        }, { passive: true });
    })();

    // ==================== 键盘快捷键 ====================
    document.addEventListener('keydown', function(e) {
        // Escape: 关闭错题弹窗
        if (e.key === 'Escape') {
            const wrongModal = document.getElementById('wrongModalContainer');
            if (wrongModal && wrongModal.innerHTML.trim()) {
                closeWrongModal();
                e.preventDefault();
                return;
            }
        }

        // 如果焦点在输入框/文本域中，仅允许极少数全局快捷键
        const tag = document.activeElement.tagName;
        const inInput = tag === 'TEXTAREA' || tag === 'INPUT' || document.activeElement.isContentEditable;

        // --- 全局快捷键（任何模式下均生效） ---

        // Ctrl+Q: 切换到刷题模式
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'q') {
            e.preventDefault();
            if (state.currentMode !== 'quiz') switchMode('quiz');
            return;
        }
        // Ctrl+P: 切换到解析模式
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'p') {
            e.preventDefault();
            if (state.currentMode !== 'parse') switchMode('parse');
            return;
        }
        // Ctrl+I: 打开/关闭 AI 助手面板
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'i') {
            e.preventDefault();
            toggleAIPanel();
            return;
        }
        // Esc: 关闭 AI 面板（如果打开的话）
        if (e.key === 'Escape' && aiState.panelOpen) {
            e.preventDefault();
            toggleAIPanel();
            return;
        }

        // --- 解析模式快捷键 ---
        if (state.currentMode === 'parse' && !inInput) {
            // Ctrl+Enter: 解析试题
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                parseQuestions();
                return;
            }
        }

        // --- 以下快捷键仅在刷题模式下且不在输入框中时生效 ---
        if (state.currentMode !== 'quiz' || state.questions.length === 0 || inInput) return;

        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const isSubmitted = state.quizStatus[realIdx] === 'correct' || state.quizStatus[realIdx] === 'incorrect';

        // ← 上一题
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevQuestion();
            return;
        }
        // → 下一题
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextQuestion();
            return;
        }
        // Enter: 提交答案（未提交时）
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!isSubmitted && q.type !== 'subjective') {
                submitAnswer();
            }
            return;
        }
        // Ctrl+E: AI 解析本题
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'e') {
            e.preventDefault();
            if (!aiState.panelOpen) toggleAIPanel();
            aiQuickAsk('explain');
            return;
        }
        // Alt+W: AI 为什么错了
        if (e.altKey && !e.ctrlKey && !e.shiftKey && e.key.toLowerCase() === 'w') {
            e.preventDefault();
            if (!aiState.panelOpen) toggleAIPanel();
            aiQuickAsk('why_wrong');
            return;
        }
        // 数字键 1-9: 选择对应选项 A-I（未提交时，根据当前题目实际选项数动态映射）
        if (!isSubmitted) {
            const shuffled = state.shuffledOptions[realIdx];
            if (shuffled && shuffled.length > 0) {
                const num = parseInt(e.key);
                if (num >= 1 && num <= shuffled.length) {
                    const mappedLabel = shuffled[num - 1].label;
                    if (mappedLabel) {
                        e.preventDefault();
                        selectOption(mappedLabel);
                        return;
                    }
                }
            }
        }
    });

    // ==================== 错题回顾 ====================
    /** 将一道题还原为可粘贴到解析模式的文本（使用原始label） */
    function questionToOriginalText(q, userAnswer, correctAnswer) {
        let text = `${q.number}. ${q.text}`;
        if (q.options && q.options.length > 0) {
            q.options.forEach(opt => {
                text += `\n  ${opt.label}. ${opt.content}`;
            });
        }
        if (correctAnswer) {
            text += `\n正确答案：${correctAnswer}`;
        }
        return text;
    }

    /** 从shuffled label映射回原始label（统一函数）
     *  @param {number} realIdx - 题目索引
     *  @param {string} shuffledAns - 随机后的答案标签
     *  @param {Array} [mapping] - 可选的映射数组，不传则使用 state.shuffledOptions
     */
    function mapShuffledToOrigLabel(realIdx, shuffledAns, mapping) {
        if (!shuffledAns) return '';
        if (mapping === undefined) {
            mapping = state.shuffledOptions[realIdx];
        }
        if (!mapping || mapping.length === 0) return shuffledAns;
        let orig = '';
        for (const ch of shuffledAns) {
            const entry = mapping.find(m => m.label === ch);
            if (entry) orig += entry.origLabel;
            else orig += ch;
        }
        return orig.split('').sort().join('');
    }

    /** 获取历史记录中的错题列表 */
    function getWrongQuestions(record) {
        const wrongList = [];
        if (!record.quizStatus || !record.questions) return wrongList;
        record.questions.forEach((q, realIdx) => {
            if (record.quizStatus[realIdx] === 'incorrect') {
                const userShuffledAns = (record.userAnswers[realIdx] || []).join('');
                const correctShuffledAns = getShuffledAnswer(realIdx, record);
                const userOrigAns = mapShuffledToOrigLabel(realIdx, userShuffledAns, record.shuffledOptions[realIdx]);
                const correctOrigAns = mapShuffledToOrigLabel(realIdx, correctShuffledAns, record.shuffledOptions[realIdx]);
                wrongList.push({
                    realIdx,
                    question: q,
                    userAnswer: userOrigAns,
                    correctAnswer: correctOrigAns,
                    originalText: questionToOriginalText(q, userOrigAns, correctOrigAns)
                });
            }
        });
        return wrongList;
    }

    // ====== 错题弹窗统一数据 ======
    let _wrongModalState = { wrongList: [], source: 'current', historyIndex: -1 };

    /** 通用剪贴板复制辅助 */
    function _copyText(text, successMsg) {
        // 检查 clipboard API 是否可用（file:// 或旧浏览器中可能不存在）
        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
            navigator.clipboard.writeText(text).then(() => {
                showToast(successMsg, 'success');
            }).catch(() => {
                fallbackCopy(text);
                showToast(successMsg, 'success');
            });
        } else {
            fallbackCopy(text);
            showToast(successMsg, 'success');
        }
    }

    /** 打开错题回顾弹窗（历史记录来源） */
    function viewWrongQuestions(index) {
        const record = state.historyRecords[index];
        if (!record) return;
        const wrongList = getWrongQuestions(record);
        if (wrongList.length === 0) {
            showToast('该记录中没有错题', 'info');
            return;
        }
        const totalCount = record.questions.filter(q => q.type !== 'subjective').length;
        _wrongModalState = { wrongList, source: 'history', historyIndex: index };
        _renderWrongModal(wrongList, totalCount);
    }

    /** 查看当前会话的错题 */
    function viewCurrentWrongQuestions() {
        if (state.questions.length === 0) {
            showToast('题库为空', 'info');
            return;
        }
        const wrongList = [];
        state.questions.forEach((q, realIdx) => {
            if (state.quizStatus[realIdx] === 'incorrect') {
                const userShuffledAns = (state.userAnswers[realIdx] || []).join('');
                const correctShuffledAns = getShuffledAnswer(realIdx);
                const userOrigAns = mapShuffledToOrigLabel(realIdx, userShuffledAns);
                const correctOrigAns = mapShuffledToOrigLabel(realIdx, correctShuffledAns);
                wrongList.push({
                    realIdx,
                    question: q,
                    userAnswer: userOrigAns,
                    correctAnswer: correctOrigAns,
                    originalText: questionToOriginalText(q, userOrigAns, correctOrigAns)
                });
            }
        });

        if (wrongList.length === 0) {
            showToast('当前没有错题', 'info');
            return;
        }
        const totalCount = state.questions.filter(q => q.type !== 'subjective').length;
        _wrongModalState = { wrongList, source: 'current', historyIndex: -1 };
        _renderWrongModal(wrongList, totalCount);
    }

    /** 渲染错题弹窗 */
    function _renderWrongModal(wrongList, totalCount) {
        const isHistory = _wrongModalState.source === 'history';
        const wrongCount = wrongList.length;
        const correctCount = totalCount - wrongCount;

        let cardsHtml = '';
        wrongList.forEach((item) => {
            const q = item.question;
            let optsHtml = '';
            if (q.options && q.options.length > 0) {
                q.options.forEach(opt => {
                    const isCorrectOpt = item.correctAnswer.includes(opt.label);
                    const isUserWrongOpt = item.userAnswer.includes(opt.label) && !item.correctAnswer.includes(opt.label);
                    let cls = 'wrong-q-opt';
                    if (isCorrectOpt) cls += ' is-correct';
                    if (isUserWrongOpt) cls += ' is-user-wrong';
                    let optIcon = '';
                    if (isCorrectOpt) optIcon = ' ✓';
                    if (isUserWrongOpt) optIcon = ' ✗';
                    optsHtml += `<div class="${cls}">${opt.label}. ${escapeHtml(opt.content)}${optIcon}</div>`;
                });
            }

            cardsHtml += `<div class="wrong-q-card">
                <div class="wrong-q-header">
                    <span class="wrong-q-num">${icon('clipboardCheck')} 第 ${q.number} 题</span>
                    <span class="wrong-q-type">${q.type === 'multi' ? '多选' : '单选'}</span>
                </div>
                <div class="wrong-q-text">${escapeHtml(q.text)}</div>
                ${optsHtml ? `<div class="wrong-q-options">${optsHtml}</div>` : ''}
                <div class="wrong-q-answer">
                    你的答案: <span class="user-ans">${item.userAnswer || '未作答'}</span>
                    &nbsp;|&nbsp; 正确答案: <b>${item.correctAnswer}</b>
                </div>
                <div class="wrong-q-actions">
                    <button class="btn btn-sm btn-outline" onclick="copyWrongItem(${item.realIdx})" style="padding:3px 10px;font-size:0.78rem;">复制此题</button>
                </div>
            </div>`;
        });

        // 底部操作按钮根据来源不同
        const redoAction = isHistory
            ? `redoWrongFromHistory(${_wrongModalState.historyIndex})`
            : `closeWrongModal();redoWrongQuestions()`;

        const modalHtml = `<div class="wrong-modal-overlay" onclick="closeWrongModal(event)">
            <div class="wrong-modal" onclick="event.stopPropagation()">
                <div class="wrong-modal-header">
                    <h2>错题回顾 <span style="font-size:0.85rem;font-weight:400;color:var(--text-secondary);">（${wrongCount} 道错题 / 共 ${totalCount} 题）</span></h2>
                    <button class="btn btn-sm btn-outline" onclick="closeWrongModal()" style="padding:4px 10px;font-size:0.85rem;">${icon('x')}</button>
                </div>
                <div class="wrong-modal-body">
                    ${cardsHtml}
                </div>
                <div class="wrong-modal-footer">
                    <div class="footer-info">正确 ${correctCount} 题 / 错误 ${wrongCount} 题 / 正确率 ${totalCount > 0 ? Math.round((correctCount / totalCount) * 100) : 0}%</div>
                    <div class="footer-actions">
                        <button class="btn btn-sm btn-outline" onclick="copyAllWrongItems()" style="padding:4px 12px;font-size:0.8rem;">复制全部错题</button>
                        <button class="btn btn-sm btn-primary" onclick="loadWrongToParse()" style="padding:4px 12px;font-size:0.8rem;">放入解析模式</button>
                        <button class="btn btn-sm btn-warn" onclick="${redoAction}" style="padding:4px 12px;font-size:0.8rem;">重做这些错题</button>
                    </div>
                </div>
            </div>
        </div>`;

        document.getElementById('wrongModalContainer').innerHTML = modalHtml;
    }

    /** 关闭错题弹窗 */
    function closeWrongModal(event) {
        if (event && event.target !== event.currentTarget) return;
        document.getElementById('wrongModalContainer').innerHTML = '';
    }

    /** 复制单道错题文本 */
    function copyWrongItem(realIdx) {
        const item = _wrongModalState.wrongList.find(w => w.realIdx === realIdx);
        if (!item) return;
        _copyText(item.originalText, '已复制该错题文本');
    }

    /** 复制全部错题文本 */
    function copyAllWrongItems() {
        const texts = _wrongModalState.wrongList.map(item => item.originalText);
        if (texts.length === 0) {
            showToast('没有错题可复制', 'info');
            return;
        }
        _copyText(texts.join('\n\n'), `已复制 ${texts.length} 道错题文本`);
    }

    /** 将错题加载到解析模式 */
    function loadWrongToParse() {
        const texts = _wrongModalState.wrongList.map(item => item.originalText);
        if (texts.length === 0) {
            showToast('没有错题可加载', 'info');
            return;
        }
        document.getElementById('inputText').value = texts.join('\n\n');
        autoResizeTextarea();
        closeWrongModal();
        if (_wrongModalState.source === 'history') closeHistoryDropdown();
        switchMode('parse');
        showToast(`已将 ${texts.length} 道错题载入解析模式，点击"解析试题"即可重新解析`, 'info');
    }

    // 保留旧函数名作为兼容（历史记录按钮 onclick 引用）
    function copySingleWrongQuestion(historyIndex, realIdx) { copyWrongItem(realIdx); }
    function copyAllWrongQuestions(historyIndex) { copyAllWrongItems(); }
    function loadWrongQuestionsToParse(historyIndex) { loadWrongToParse(); }
    function copyWrongItemText(realIdx) { copyWrongItem(realIdx); }
    function copyAllCurrentWrongQuestions() { copyAllWrongItems(); }
    function loadCurrentWrongQuestionsToParse() { loadWrongToParse(); }

    /** 剪贴板降级方案 */
    function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }

</script>
