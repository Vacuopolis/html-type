            <button class="ai-send-btn" id="aiSendBtn" onclick="sendAIMessage()" title="发送">➤</button>
        </div>
    </div>
</div>

<script>
    // ==================== 全局状态 ====================
    const LABELS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

    const state = {
        questions: [],           // 解析后的题库
        currentMode: 'parse',    // 当前模式: 'parse' | 'quiz'
        // 刷题模式
        quizIndex: 0,            // 当前题目索引（在随机序列中的位置）
        userAnswers: [],         // 用户作答: [['A'], ['B','C'], [], ...]  (存储的是随机后的label)
        quizStatus: [],          // 'unanswered' | 'correct' | 'incorrect'
        shuffleEnabled: false,   // 是否启用随机做题
        quizOrder: [],           // 刷题顺序数组，正常题在前、未识别题在后
        shuffledOptions: [],     // 每题的选项随机映射: shuffledOptions[realIdx] = [{origIdx, label, content}]
                                  // origIdx: 在原始options中的索引, label: 显示的标签(A/B/C/D/E/F/...)
        // 历史
        historyRecords: [],
        _activeHistoryTime: null,  // 当前加载的历史记录时间标识
        // 错题重做
        wrongRedoMode: false,       // 是否处于错题重做模式
        savedFullQuizOrder: [],     // 进入重做模式前保存的完整quizOrder
    };

    // ==================== 粘贴提示 ====================
    const inputText = document.getElementById('inputText');
    inputText.addEventListener('paste', () => {
        setTimeout(() => {
            autoResizeTextarea();
            showToast('已粘贴文本，点击"解析试题"按钮开始解析', 'info');
        }, 150);
    });

    // textarea 自适应高度
    function autoResizeTextarea() {
        inputText.style.height = 'auto';
        inputText.style.height = Math.max(320, Math.min(inputText.scrollHeight, 600)) + 'px';
    }
    inputText.addEventListener('input', autoResizeTextarea);

    // ==================== 核心解析算法 ====================
    /** 标准化题目文本用于去重比较（去除空白、标点差异） */
    function normalizeText(text) {
        return text.replace(/[\s\u00A0\u3000]+/g, '')
                   .replace(/[（(]/g, '(')
                   .replace(/[）)]/g, ')')
                   .replace(/[，,]/g, ',')
                   .replace(/[。.．]/g, '.')
                   .replace(/[？?]/g, '?')
                   .replace(/[！!]/g, '!')
                   .replace(/[：:]/g, ':')
                   .replace(/[；;]/g, ';')
                   .replace(/["""]/g, '"')
                   .replace(/[''']/g, "'")
                   .toLowerCase();
    }

    /** 生成题目的唯一指纹（题干+选项内容） */
    function questionFingerprint(q) {
        const stemNorm = normalizeText(q.text);
        const optsNorm = (q.options || [])
            .map(o => normalizeText(o.label + '.' + o.content))
            .sort()
            .join('|');
        return stemNorm + '||' + optsNorm;
    }

    /** 对解析结果去重，合并完全相同的题目 */
    function deduplicateQuestions(questions) {
        const seen = new Map(); // fingerprint -> index in result
        const result = [];
        let dupCount = 0;

        for (const q of questions) {
            const fp = questionFingerprint(q);
            if (seen.has(fp)) {
                // 合并：如果已有题目没答案而新题有答案，则补充答案
                const existingIdx = seen.get(fp);
                const existing = result[existingIdx];
                if (!existing.answer && q.answer) {
                    existing.answer = q.answer;
                    existing.type = q.type;
                }
                dupCount++;
            } else {
                seen.set(fp, result.length);
                result.push({ ...q });
            }
        }

        return { questions: result, dupCount };
    }

    function parseQuestions() {
        const text = document.getElementById('inputText').value.trim();
        if (!text) {
            showToast('请先输入试题文本', 'error');
            return;
        }

        const rawQuestions = doParse(text);
        if (rawQuestions.length === 0) {
            showToast('未能识别出有效的试题，请检查文本格式', 'error');
            return;
        }

        // 去重合并
        const { questions, dupCount } = deduplicateQuestions(rawQuestions);

        // 重新编号（合并后序号可能不连续）
        questions.forEach((q, i) => { q.number = i + 1; });

        state.questions = questions;
        state.userAnswers = questions.map(() => []);
        state.quizStatus = questions.map(() => 'unanswered');
        state.quizIndex = 0;
        state.quizOrder = generateQuizOrder(state.shuffleEnabled);
        state.shuffledOptions = generateShuffledOptions(state.shuffleEnabled);
        state.wrongRedoMode = false;
        state.savedFullQuizOrder = [];
        aiState.chatCache = {};
        aiState.currentChatKey = null;

        renderParsePreview();
        updateStats();
        addHistory(questions);

        const noAnswer = questions.filter(q => !q.answer).length;
        let msg = `成功解析 ${questions.length} 道试题`;
        if (dupCount > 0) msg += `（已合并 ${dupCount} 道重复题）`;
        if (noAnswer > 0) msg += `（${noAnswer} 题未识别答案）`;
        showToast(msg, (dupCount > 0 || noAnswer > 0) ? 'info' : 'success');

        // 显示AI助手按钮
        const aiFab = document.getElementById('aiFab');
        if (aiFab) aiFab.style.display = 'flex';
    }

    function doParse(text) {
        const questions = [];
        const lines = text.split(/\r?\n/);
        let currentQ = null;
        const pendingAnswers = [];

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].replace(/[\u00A0\u3000]+/g, ' ').trim();
            if (!line) continue;

            // 尝试提取独立答案行
            const standaloneAns = tryExtractStandaloneAnswer(line);
            if (standaloneAns) {
                if (currentQ && !currentQ.answer) {
                    currentQ.answer = standaloneAns;
                    currentQ.type = standaloneAns.length > 1 ? 'multi' : 'single';
                } else {
                    pendingAnswers.push(standaloneAns);
                }
                continue;
            }

            // 跳过章节标题
            if (isSectionHeader(line)) continue;

            // 尝试匹配题目
            const qMatch = tryMatchQuestion(line);
            if (qMatch) {
                if (currentQ) {
                    finalizeQuestion(currentQ);
                    questions.push(currentQ);
                }
                currentQ = {
                    number: qMatch.number,
                    text: qMatch.text,
                    options: qMatch.options || [],
                    answer: qMatch.answer || '',
                    type: qMatch.answer ? (qMatch.answer.length > 1 ? 'multi' : 'single') : 'single'
                };

                // 消费待分配答案
                while (pendingAnswers.length > 0 && !currentQ.answer) {
                    currentQ.answer = pendingAnswers.shift();
                    currentQ.type = currentQ.answer.length > 1 ? 'multi' : 'single';
                }
                continue;
            }

            // 尝试提取选项
            const opts = tryExtractOptions(line);
            if (opts.length > 0 && currentQ) {
                for (const opt of opts) {
                    if (!currentQ.options.some(o => o.label === opt.label)) {
                        currentQ.options.push(opt);
                    }
                }
                continue;
            }

            // 尝试提取单独的选项（跨行选项，如只有 C. xxx D. yyy 的行）
            const singleOpts = tryExtractSingleOptions(line);
            if (singleOpts.length > 0 && currentQ) {
                for (const opt of singleOpts) {
                    if (!currentQ.options.some(o => o.label === opt.label)) {
                        currentQ.options.push(opt);
                    }
                }
                continue;
            }

            // 附加到当前题干
            if (currentQ && currentQ.options.length === 0) {
                currentQ.text += ' ' + line;
            }
        }

        if (currentQ) {
            finalizeQuestion(currentQ);
            questions.push(currentQ);
        }

        // 剩余待分配答案
        for (let k = 0; k < questions.length; k++) {
            if (!questions[k].answer && pendingAnswers.length > 0) {
                questions[k].answer = pendingAnswers.shift();
                questions[k].type = questions[k].answer.length > 1 ? 'multi' : 'single';
            }
        }

        return questions;
    }

    function tryMatchQuestion(line) {
        const patterns = [
            /^(\d+)\s*[.、．)\]】]\s*/,
            /^[（(]\s*(\d+)\s*[）)]\s*/
        ];

        for (const pattern of patterns) {
            const m = line.match(pattern);
            if (m) {
                const num = parseInt(m[1]);
                const rest = line.substring(m[0].length);

                const optStartIdx = findFirstOptionIndex(rest);
                let qText, optPart;

                if (optStartIdx > 0) {
                    qText = rest.substring(0, optStartIdx).trim();
                    optPart = rest.substring(optStartIdx);
                } else {
                    qText = rest.trim();
                    optPart = '';
                }

                const embedded = tryExtractEmbeddedAnswer(qText);
                let answer = '';
                if (embedded) {
                    qText = qText.replace(embedded.original, '（  ）');
                    answer = embedded.answer;
                }

                const options = optPart ? tryExtractOptions(optPart) : [];

                return { number: num, text: qText, answer, options };
            }
        }
        return null;
    }

    function findFirstOptionIndex(text) {
        // 寻找选项 A 的起始位置
        // 需要确保 A 不是一个单词的一部分（如 "A." 或 "A、" 而非 "CAR."）
        const regex = /(?:^|\s)([Aa])\s*[.、．)\]】]\s*/g;
        let match;
        while ((match = regex.exec(text)) !== null) {
            // 验证 A 后面还有其他选项（B、C 等）
            const after = text.substring(match.index + match[0].length);
            if (/\s+[B-Zb-z]\s*[.、．)\]】]\s*/.test(after)) {
                // 返回选项区域的起始位置（包含 A 前面的空格，便于 qText 截断）
                return match.index;
            }
        }
        return -1;
    }

    function tryExtractEmbeddedAnswer(text) {
        const regex = /[（(]\s*([A-Za-z]{1,8})\s*[）)]/g;
        let lastMatch = null;
        let lastAnswer = null;
        let m;
        while ((m = regex.exec(text)) !== null) {
            const candidate = m[1].toUpperCase();
            if (/^[A-Z]+$/.test(candidate)) {
                lastMatch = m[0];
                lastAnswer = candidate.split('').sort().join('');
            }
        }
        return lastMatch ? { original: lastMatch, answer: lastAnswer } : null;
    }

    function tryExtractStandaloneAnswer(line) {
        const patterns = [
            /(?:正确答案|参考答案|标准答案|答案)[：:]\s*([A-Za-z]{1,8})(?:\s|$)/,
            /[（(]\s*(?:正确答案|参考答案|标准答案|答案)[：:]\s*([A-Za-z]{1,8})\s*[）)]/,
            /【答案】\s*([A-Za-z]{1,8})/,
            /答案[是为]\s*[:：]?\s*([A-Za-z]{1,8})(?:\s|[,，。.]|$)/
        ];
        for (const pattern of patterns) {
            const m = line.match(pattern);
            if (m) {
                const ans = m[1].toUpperCase();
                if (/^[A-Z]+$/.test(ans)) {
                    return ans.split('').sort().join('');
                }
            }
        }
        return null;
    }

    function isSectionHeader(line) {
        if (/^[一二三四五六七八九十百]+[、．.]/.test(line)) return true;
        if (/^(单选题|多选题|判断题|填空题|简答题|论述题|综合题)/.test(line)) return true;
        if (/^《.*》/.test(line) && line.length < 40) return true;
        if (/^(绪论|前言|导言|第[一二三四五六七八九十百\d]+[章节篇部部分单元编模块])/.test(line)) return true;
        if (/^[（(]\s*共?\s*\d+\s*题?\s*[）)]/.test(line)) return true;
        return false;
    }

    function tryExtractOptions(text) {
        const regex = /([A-Za-z])\s*[.、．)\]】]\s*([\s\S]+?)(?=\s+[A-Za-z]\s*[.、．)\]】]\s*|$)/g;
        let m;
        const raw = [];
        while ((m = regex.exec(text)) !== null) {
            const label = m[1].toUpperCase();
            const content = m[2].trim();
            if (content && /^[A-Z]$/.test(label)) {
                raw.push({ label, content });
            }
        }
        if (raw.length === 0) return [];

        // 验证选项标签的合理性：
        // 1. 标签应全部是大写字母 A-Z
        // 2. 标签应构成连续或接近连续的序列（允许从非 A 开始，适配跨行选项）
        // 3. 过滤掉误匹配（如 "e.g."、"i.e." 等孤立的英文缩写）
        const labels = raw.map(o => o.label);

        // 计算标签是否在一个合理的字母范围内
        const minLabel = labels[0];
        const maxLabel = labels[labels.length - 1];
        const minCode = minLabel.charCodeAt(0);
        const maxCode = maxLabel.charCodeAt(0);

        // 标签范围不能太大（最多 8 个选项，即 A-H）
        if (maxCode - minCode > 7) return [];
        // 标签必须是递增序列
        if (!labels.every((l, i) => i === 0 || l.charCodeAt(0) > labels[i - 1].charCodeAt(0))) return [];
        // 至少有 2 个选项才认为是有效选项行（避免误匹配单个字母）
        if (raw.length < 2) {
            // 但如果只有一个选项，且标签在 A-H 范围内，也接受（可能是跨行的最后一个选项）
            if (raw.length === 1 && minCode >= 65 && minCode <= 72) return raw;
            return [];
        }

        return raw;
    }

    /** 提取跨行的单个/多个选项（如 "C.开天辟地、敢为人先    D.承前启后、继往开来"）
     *  与 tryExtractOptions 不同，此函数不要求选项从 A 开始
     */
    function tryExtractSingleOptions(line) {
        const regex = /([A-Z])\s*[.、．)\]】]\s*([\s\S]+?)(?=\s+[A-Z]\s*[.、．)\]】]\s*|$)/g;
        const raw = [];
        let m;
        while ((m = regex.exec(line)) !== null) {
            const label = m[1];
            const content = m[2].trim();
            if (content && /^[A-Z]$/.test(label)) {
                raw.push({ label, content });
            }
        }
        if (raw.length === 0) return [];

        // 验证标签是递增且在合理范围内
        const labels = raw.map(o => o.label);
        const minCode = labels[0].charCodeAt(0);
        const maxCode = labels[labels.length - 1].charCodeAt(0);
        if (maxCode - minCode > 7) return [];
        if (!labels.every((l, i) => i === 0 || l.charCodeAt(0) > labels[i - 1].charCodeAt(0))) return [];
        // 标签必须从 B 开始或之后（A 开头的情况已由 tryExtractOptions 处理）
        if (minCode < 66) return [];
        // 至少有 1 个选项
        return raw;
    }

    function finalizeQuestion(q) {
        // 去重选项
        const seen = {};
        q.options = q.options.filter(opt => {
            if (seen[opt.label]) return false;
            seen[opt.label] = true;
            return true;
        });
        // 清理文本：移除不可见控制字符，压缩空白
        q.text = q.text.replace(/[\u0000-\u001F\u007F-\u009F\u200B-\u200D\uFEFF\u00AD]/g, '')
                        .replace(/\s+/g, ' ').trim();
        // 清理选项内容
        q.options.forEach(opt => {
            opt.content = opt.content.replace(/[\u0000-\u001F\u007F-\u009F\u200B-\u200D\uFEFF\u00AD]/g, '')
                                     .replace(/\s+/g, ' ').trim();
        });

        // 判断题型
        if (q.options.length === 0) {
            // 无选项时无法交互作答，标记为主观题
            q.type = 'subjective';
        } else if (q.answer && q.answer.length > 1) {
            q.type = 'multi';
        }
        // else: type 保持 tryMatchQuestion 中设置的 'single'
    }

    // ==================== 模式切换 ====================
    function switchMode(mode) {
        if (state.questions.length === 0 && mode === 'quiz') {
            showToast('题库为空，请先在解析模式中导入试题', 'error');
            return;
        }
        if (mode === 'quiz') {
            const objectiveCount = state.questions.filter(q => q.type !== 'subjective').length;
            if (objectiveCount === 0) {
                showToast('当前题库没有客观题，刷题模式需要至少一道选择题', 'warning');
                return;
            }
        }

        // 切换到解析模式时退出错题重做模式
        if (mode === 'parse' && state.wrongRedoMode) {
            exitWrongRedoMode();
        }

        state.currentMode = mode;
        document.querySelectorAll('.mode-tab').forEach(tab => {
            const isParse = tab.textContent.includes('解析');
            tab.classList.toggle('active', mode === 'parse' ? isParse : !isParse);
            tab.setAttribute('aria-pressed', mode === 'parse' ? isParse : !isParse);
        });

        document.getElementById('parseModeView').classList.toggle('hidden', mode !== 'parse');
        document.getElementById('quizModeView').classList.toggle('hidden', mode !== 'quiz');

        if (mode === 'parse') {
            renderParsePreview();
        } else {
            document.getElementById('shuffleToggle').checked = state.shuffleEnabled;
            if (state.quizOrder.length === 0) {
                state.quizOrder = generateQuizOrder(state.shuffleEnabled);
            }
            if (state.shuffledOptions.length === 0) {
                state.shuffledOptions = generateShuffledOptions(state.shuffleEnabled);
            }
            renderQuizView();
            renderAnswerSheet();
        }

        // AI助手按钮可见性：两个模式都可见
        const aiFab = document.getElementById('aiFab');
        if (aiFab) aiFab.style.display = state.questions.length > 0 ? 'flex' : 'none';
        // 如果切换到解析模式且AI面板打开，关闭面板
        if (mode === 'parse' && aiState.panelOpen) {
            toggleAIPanel();
        }
    }

    // ==================== 解析模式渲染 ====================
    function renderParsePreview() {
        const area = document.getElementById('previewArea');
        const statsBar = document.getElementById('statsBar');

        if (state.questions.length === 0) {
            area.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>粘贴试题文本并点击"解析试题"<br>解析结果将在此处显示</p></div>';
            statsBar.style.display = 'none';
            document.getElementById('questionCount').textContent = '0 题';
            return;
        }

        statsBar.style.display = 'flex';

        let html = '<div class="question-list">';
        state.questions.forEach((q, i) => {
            const typeClass = q.type === 'multi' ? 'multi' : q.type === 'subjective' ? 'unrecognized' : 'single';
            const typeLabel = q.type === 'multi' ? '多选' : q.type === 'subjective' ? '未识别' : '单选';

            html += `<div class="question-card">
                <div class="q-header">
                    <span class="q-num">第${q.number}题</span>
                    <span class="q-type ${typeClass}">${typeLabel}</span>
                    ${q.answer ? `<span class="answer-tag">${q.answer}</span>` : '<span class="no-answer-tag">未识别答案</span>'}
                </div>
                <div class="q-body">
                    <div class="q-text">${formatStem(escapeHtml(q.text))}</div>
                    ${q.options.length > 0 ? `<div class="options-list">
                        ${q.options.map(opt => {
                            const isCorrect = q.answer && q.answer.includes(opt.label);
                            return `<div class="option-item ${isCorrect ? 'correct' : ''}">
                                <span class="opt-label">${opt.label}</span>
                                <span class="opt-text">${escapeHtml(opt.content)}</span>
                                ${isCorrect ? '<span class="opt-check" style="color:var(--success);">✓</span>' : ''}
                            </div>`;
                        }).join('')}
                    </div>` : '<div style="color: var(--text-secondary); font-size: 0.9rem;">（未识别题型，无标准选项）</div>'}
                </div>
            </div>`;
        });
        html += '</div>';

        area.innerHTML = html;
    }

    function formatStem(text) {
        // 将空括号（全角和半角）替换为填空下划线
        return text.replace(/[（(]\s*[）)]/g, '<span class="q-blank">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>');
    }

    function updateStats() {
        const total = state.questions.length;
        let single = 0, multi = 0, unrecognized = 0;

        state.questions.forEach(q => {
            if (!q.answer || q.type === 'subjective') unrecognized++;
            else if (q.type === 'multi') multi++;
            else single++;
        });

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statSingle').textContent = single;
        document.getElementById('statMulti').textContent = multi;
        document.getElementById('statUnrecognized').textContent = unrecognized;
        document.getElementById('questionCount').textContent = `${total} 题`;
    }

    // ==================== 随机做题 ====================
    function isUnrecognizedQuestion(q) {
        return q.type === 'subjective' || !q.answer;
    }

    function generateQuizOrder(shuffle) {
        const normalIdx = [];
        const unrecIdx = [];
        state.questions.forEach((q, i) => {
            if (isUnrecognizedQuestion(q)) unrecIdx.push(i);
            else normalIdx.push(i);
        });
        if (shuffle) {
            shuffleArray(normalIdx);
            shuffleArray(unrecIdx);
        }
        return [...normalIdx, ...unrecIdx];
    }

    /** 继续答题时构建题目顺序：已答正常题 + 未答正常题 + 已答未识别 + 未答未识别
     *  不重新打乱已答题顺序，未答题如果开启随机则打乱
     */
    function buildContinueQuizOrder() {
        const answeredNormal = [];
        const unansweredNormal = [];
        const answeredUnrec = [];
        const unansweredUnrec = [];
        state.questions.forEach((q, i) => {
            const isAnswered = state.quizStatus[i] !== 'unanswered';
            const isUnrec = isUnrecognizedQuestion(q);
            if (isAnswered && !isUnrec) answeredNormal.push(i);
            else if (!isAnswered && !isUnrec) unansweredNormal.push(i);
            else if (isAnswered && isUnrec) answeredUnrec.push(i);
            else unansweredUnrec.push(i);
        });
        if (state.shuffleEnabled) {
            shuffleArray(unansweredNormal);
            shuffleArray(unansweredUnrec);
        }
        return [...answeredNormal, ...unansweredNormal, ...answeredUnrec, ...unansweredUnrec];
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    /** 为每道题生成选项随机映射
     *  返回数组: shuffledOptions[realIdx] = [{origIdx, label, content}, ...]
     *  - origIdx: 该选项在原始q.options中的索引
     *  - label:   显示给用户的新标签(A/B/C/D)
     *  - content: 选项文本内容
     */
    function generateShuffledOptions(shuffleOptions) {
        return state.questions.map(q => {
            if (!q.options || q.options.length === 0) return [];
            const indices = q.options.map((_, i) => i);
            if (shuffleOptions) {
                shuffleArray(indices);
            }
            return indices.map((origIdx, newPos) => ({
                origIdx,
                label: LABELS[newPos] || String(newPos + 1),
                content: q.options[origIdx].content,
                origLabel: q.options[origIdx].label   // 原始标签，用于判断正确性
            }));
        });
    }

    /** 根据选项随机映射，将原始答案转换为随机后的答案标签 */
    function getShuffledAnswer(realIdx) {
        const q = state.questions[realIdx];
        const shuffled = state.shuffledOptions[realIdx];
        if (!q || !q.answer || !shuffled || shuffled.length === 0) return q ? q.answer : '';
        // 找到原始答案中每个字母对应的origIdx，再在shuffled中找到对应的新label
        const result = [];
        for (const ch of q.answer) {
            const entry = shuffled.find(s => s.origLabel === ch);
            if (entry) result.push(entry.label);
        }
        return result.sort().join('');
    }

    /** 重新映射用户答案：切换随机模式时，将旧标签映射为新标签，保留已答进度 */
    function remapUserAnswers(oldShuffledOptions) {
        state.userAnswers = state.userAnswers.map((oldAns, realIdx) => {
            if (oldAns.length === 0) return [];

            const oldMapping = oldShuffledOptions[realIdx] || [];
            const newMapping = state.shuffledOptions[realIdx] || [];

            // 将旧标签 -> origIdx -> 新标签
            const newAns = [];
            for (const label of oldAns) {
                const oldEntry = oldMapping.find(e => e.label === label);
                if (oldEntry) {
                    const newEntry = newMapping.find(e => e.origIdx === oldEntry.origIdx);
                    if (newEntry) {
                        newAns.push(newEntry.label);
                    }
                }
            }
            return newAns.sort();
        });
        // quizStatus 保持不变——正确与否取决于选项内容，与标签无关
    }

    function toggleShuffle(enabled) {
        state.shuffleEnabled = enabled;

        // 分类：已答/未答 × 正常/未识别
        const answeredNormal = [];
        const answeredUnrec = [];
        const unansweredNormal = [];
        const unansweredUnrec = [];

        state.quizOrder.forEach(realIdx => {
            const isAnswered = state.quizStatus[realIdx] !== 'unanswered';
            const isUnrec = isUnrecognizedQuestion(state.questions[realIdx]);
            if (isAnswered && !isUnrec) answeredNormal.push(realIdx);
            else if (isAnswered && isUnrec) answeredUnrec.push(realIdx);
            else if (!isAnswered && !isUnrec) unansweredNormal.push(realIdx);
            else unansweredUnrec.push(realIdx);
        });

        if (enabled) {
            shuffleArray(unansweredNormal);
            shuffleArray(unansweredUnrec);
        }

        // 重建 quizOrder：正常题在前（已答保持相对顺序 + 未答），未识别题在后（已答保持相对顺序 + 未答）
        state.quizOrder = [
            ...answeredNormal,
            ...unansweredNormal,
            ...answeredUnrec,
            ...unansweredUnrec
        ];

        // 已答题保持原有选项映射，未答题重新生成
        const oldShuffledOptions = state.shuffledOptions;
        state.shuffledOptions = state.questions.map((q, realIdx) => {
            if (state.quizStatus[realIdx] !== 'unanswered') {
                return oldShuffledOptions[realIdx];
            }
            if (!q.options || q.options.length === 0) return [];
            const indices = q.options.map((_, i) => i);
            if (enabled) {
                shuffleArray(indices);
            }
            return indices.map((origIdx, newPos) => ({
                origIdx,
                label: LABELS[newPos] || String(newPos + 1),
                content: q.options[origIdx].content,
                origLabel: q.options[origIdx].label
            }));
        });

        // 已答题选项未变，无需重映射用户答案

        // 跳到第一道未答题（按 quizOrder 顺序查找）
        const firstUnansweredPos = state.quizOrder.findIndex(
            realIdx => state.quizStatus[realIdx] === 'unanswered'
        );
        state.quizIndex = firstUnansweredPos >= 0 ? firstUnansweredPos : 0;

        // 如果在错题重做模式，同步更新 savedFullQuizOrder 中未答题的顺序
        if (state.wrongRedoMode && state.savedFullQuizOrder.length > 0) {
            // 对 savedFullQuizOrder 中未答题也重新打乱
            const fullAnswered = [];
            const fullUnanswered = [];
            state.savedFullQuizOrder.forEach(realIdx => {
                if (state.quizStatus[realIdx] !== 'unanswered') fullAnswered.push(realIdx);
                else fullUnanswered.push(realIdx);
            });
            if (enabled) shuffleArray(fullUnanswered);
            state.savedFullQuizOrder = [...fullAnswered, ...fullUnanswered];
        }

        renderQuizView();
        renderAnswerSheet();
        updateAIQuestionInfo();
        if (state.currentMode === 'parse') {
            renderParsePreview();
        }
        saveCurrentProgress();
        const modeDesc = enabled ? '已开启随机模式' : '已切换为顺序做题';
        showToast(modeDesc, 'info');
    }

    /** 获取当前显示的题目在原始数组中的索引 */
    function getRealIndex(quizIdx) {
        return state.quizOrder[quizIdx];
    }

    // ==================== 刷题模式渲染 ====================
    function renderQuizView() {
        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const status = state.quizStatus[realIdx];
        const myAns = state.userAnswers[realIdx];
        const isSubmitted = status !== 'unanswered';
        const shuffled = state.shuffledOptions[realIdx] || [];
        const shuffledAnswer = getShuffledAnswer(realIdx);

        let typeHint = q.type === 'multi' ? '<span class="quiz-type-hint multi">多选题</span>' : q.type === 'subjective' ? '<span class="quiz-type-hint unrecognized">未识别题型</span>' : '<span class="quiz-type-hint single">单选题</span>';
        let progressText = `第 ${state.quizIndex + 1} / ${state.quizOrder.length} 题`;
        let html = '';
        // 错题重做模式横幅
        if (state.wrongRedoMode) {
            html += `<div class="wrong-redo-banner">
                <div class="banner-info">
                    <span class="redo-icon">🔄</span> 错题重做模式
                    <span class="banner-count">（共 ${state.quizOrder.length} 道错题）</span>
                </div>
                <button class="btn btn-sm btn-outline" onclick="exitWrongRedoMode()" style="padding:4px 12px;font-size:0.8rem;">返回全部题目</button>
            </div>`;
        }
        html += `<div class="quiz-progress">${progressText} ${typeHint}</div>`;
        html += `<div class="quiz-stem">${formatStem(escapeHtml(q.text))}</div>`;

        // 选项区域 - 使用 shuffledOptions
        if (shuffled.length > 0) {
            html += '<div class="quiz-options">';
            shuffled.forEach(opt => {
                let cls = 'quiz-option';
                let clickAttr = `onclick="selectOption('${opt.label}')"`;

                if (isSubmitted) {
                    clickAttr = '';
                    const isCorrectOpt = shuffledAnswer && shuffledAnswer.includes(opt.label);
                    const isSelected = myAns.includes(opt.label);

                    if (isCorrectOpt && isSelected) {
                        cls += ' is-correct';
                    } else if (isCorrectOpt && !isSelected) {
                        cls += ' is-missed';
                    } else if (!isCorrectOpt && isSelected) {
                        cls += ' is-wrong';
                    }
                } else {
                    if (myAns.includes(opt.label)) {
                        cls += ' selected';
                    }
                }

                html += `<div class="${cls}" ${clickAttr}>
                    <span class="opt-label">${opt.label}</span>
                    <span class="opt-text">${escapeHtml(opt.content)}</span>
                    ${isSubmitted && shuffledAnswer && shuffledAnswer.includes(opt.label) ? '<span class="opt-check" style="margin-left:auto;color:var(--success);">✓</span>' : ''}
                    ${isSubmitted && myAns.includes(opt.label) && !(shuffledAnswer && shuffledAnswer.includes(opt.label)) ? '<span class="opt-check" style="margin-left:auto;color:var(--error);">✗</span>' : ''}
                </div>`;
            });
            html += '</div>';
            if (!isSubmitted) {
                html += `<div class="shortcut-hint" style="text-align:right;font-size:0.75rem;color:var(--text-secondary);margin-top:4px;">按 ${shuffled.slice(0, 9).map((_, i) => `${i+1}`).join(' ')} 键可快速选择 ${shuffled.slice(0, 9).map(o => o.label).join(' ')}</div>`;
            }
        } else {
            html += '<div style="color: var(--text-secondary); margin-bottom: 20px;">（未识别题型，请自行核对思路）</div>';
        }

        // 操作区
        html += '<div class="quiz-actions">';
        html += `<button class="btn btn-outline" onclick="prevQuestion()" ${state.quizIndex === 0 ? 'disabled' : ''} title="快捷键: ←">← 上一题<span class="shortcut-hint"> (←)</span></button>`;

        if (!isSubmitted && q.type !== 'subjective') {
            html += '<button class="btn btn-primary" onclick="submitAnswer()" title="快捷键: Enter">提交作答<span class="shortcut-hint"> (Enter)</span></button>';
        } else if (isSubmitted) {
            const isCorrect = status === 'correct';
            const tipColor = isCorrect ? 'var(--success)' : 'var(--error)';
            const tipBg = isCorrect ? 'var(--success-bg)' : 'var(--error-bg)';
            const tipText = isCorrect ? '🎉 回答正确' : `❌ 回答错误，正确答案: ${shuffledAnswer}`;
            html += `<div class="quiz-result-tip" style="color:${tipColor};background:${tipBg}">${tipText}</div>`;
        } else {
            html += '<div style="color: var(--text-secondary); font-size: 0.9rem;">未识别题型无标准答案</div>';
        }

        html += `<button class="btn btn-outline" onclick="nextQuestion()" ${state.quizIndex >= state.quizOrder.length - 1 ? 'disabled' : ''} title="快捷键: →">下一题 →<span class="shortcut-hint"> (→)</span></button>`;
        html += '</div>';

        document.getElementById('quizContentArea').innerHTML = html;
    }

    function renderAnswerSheet() {
        let correctCount = 0;
        let answeredCount = 0;
        let html = '';

        // 始终按 quizOrder 遍历
        state.quizOrder.forEach((realIdx, displayPos) => {
            const q = state.questions[realIdx];
            let cls = '';
            if (state.quizStatus[realIdx] === 'correct') { cls = 'correct'; correctCount++; answeredCount++; }
            else if (state.quizStatus[realIdx] === 'incorrect') { cls = 'incorrect'; answeredCount++; }
            if (realIdx === getRealIndex(state.quizIndex)) cls += ' active';

            html += `<div class="sheet-item ${cls}" onclick="jumpToQuestion(${displayPos})" title="第${q.number}题">${displayPos + 1}</div>`;
        });

        const wrongInCurrent = state.quizStatus.filter(s => s === 'incorrect').length;

        document.getElementById('answerSheet').innerHTML = html;

        // 正确率
        const scoreEl = document.getElementById('quizScore');
        if (answeredCount > 0) {
            scoreEl.textContent = `正确率: ${Math.round((correctCount / answeredCount) * 100)}%`;
        } else {
            scoreEl.textContent = '';
        }

        // 评分面板：仅统计客观题（排除主观题）
        const objectiveCount = state.questions.filter(q => q.type !== 'subjective').length;
        if (objectiveCount > 0 && answeredCount === objectiveCount && !state.wrongRedoMode) {
            const pct = Math.round((correctCount / objectiveCount) * 100);
            const panelCls = pct >= 80 ? 'good' : (pct >= 60 ? 'mid' : 'bad');
            const icon = pct >= 80 ? '🎉' : (pct >= 60 ? '📝' : '📚');
            let actionHtml = '';
            if (wrongInCurrent > 0) {
                actionHtml = `<div class="score-actions">
                    <button class="score-action-btn btn-danger" onclick="viewCurrentWrongQuestions()">❌ 查看错题</button>
                    <button class="score-action-btn btn-warn" onclick="redoWrongQuestions()">🔄 错题重做 (${wrongInCurrent})</button>
                </div>`;
            }
            document.getElementById('scorePanel').innerHTML = `
                <div class="score-panel ${panelCls}">
                    <div class="score-info">
                        <div class="score-text">
                            <div class="score-num">${correctCount} / ${objectiveCount}　正确率 ${pct}%</div>
                            <div class="score-detail">${pct >= 80 ? '表现优秀！' : (pct >= 60 ? '继续加油！' : '需要多练习！')}</div>
                        </div>
                    </div>
                    ${actionHtml}
                </div>`;
        } else if (state.wrongRedoMode && answeredCount === state.quizOrder.length) {
            // 错题重做模式下的评分面板
            const redoPct = Math.round((correctCount / answeredCount) * 100);
            const panelCls = redoPct >= 80 ? 'good' : (redoPct >= 60 ? 'mid' : 'bad');
            const stillWrong = answeredCount - correctCount;
            const icon = stillWrong === 0 ? '🎉' : '🔄';
            const resultMsg = stillWrong === 0 ? '全部正确！' : `仍有 ${stillWrong} 道错题`;
            document.getElementById('scorePanel').innerHTML = `
                <div class="score-panel ${panelCls}">
                    <div class="score-info">
                        <div class="score-text">
                            <div class="score-num">${correctCount} / ${answeredCount}　重做正确率 ${redoPct}%</div>
                            <div class="score-detail">${resultMsg}</div>
                        </div>
                    </div>
                    <div class="score-actions">
                        ${stillWrong > 0 ? `<button class="score-action-btn btn-danger" onclick="viewCurrentWrongQuestions()">❌ 查看错题</button>
                        <button class="score-action-btn btn-warn" onclick="redoWrongQuestions()">🔄 再次重做 (${stillWrong})</button>` : ''}
                        <button class="score-action-btn" onclick="exitWrongRedoMode()">↩ 返回全部</button>
                    </div>
                </div>`;
        } else {
            document.getElementById('scorePanel').innerHTML = '';
        }
    }

    // ==================== 刷题交互 ====================
    function selectOption(label) {
        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        let myAns = state.userAnswers[realIdx];

        if (q.type === 'single') {
            myAns = [label];
        } else {
            const idx = myAns.indexOf(label);
            if (idx > -1) myAns.splice(idx, 1);
            else myAns.push(label);
            myAns.sort();
        }

        state.userAnswers[realIdx] = myAns;
        renderQuizView();
        updateAIQuestionInfo();
    }

    function submitAnswer() {
        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const myAns = state.userAnswers[realIdx];

        if (myAns.length === 0) {
            showToast('请先选择答案', 'error');
            return;
        }

        // 使用随机映射后的答案进行比较
        const shuffledAnswer = getShuffledAnswer(realIdx);
        const isCorrect = shuffledAnswer &&
            shuffledAnswer.length === myAns.length &&
            shuffledAnswer.split('').every(a => myAns.includes(a));

        state.quizStatus[realIdx] = isCorrect ? 'correct' : 'incorrect';
        saveCurrentProgress();
        renderQuizView();
        renderAnswerSheet();
        updateAIQuestionInfo();

        showToast(
            isCorrect ? '回答正确！' : `回答错误，正确答案: ${shuffledAnswer}`,
            isCorrect ? 'success' : 'error'
        );
    }

    function prevQuestion() {
        if (state.quizIndex > 0) {
            state.quizIndex--;
            renderQuizView();
            renderAnswerSheet();
            onAIQuestionChange();
        }
    }

    function nextQuestion() {
        if (state.quizIndex < state.quizOrder.length - 1) {
            state.quizIndex++;
            renderQuizView();
            renderAnswerSheet();
            onAIQuestionChange();
        }
    }

    function jumpToQuestion(quizIdx) {
        state.quizIndex = quizIdx;
        renderQuizView();
        renderAnswerSheet();
        onAIQuestionChange();
        requestAnimationFrame(() => {
            const contentArea = document.getElementById('quizContentArea');
            if (contentArea) contentArea.scrollTo({ top: 0, behavior: 'smooth' });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    // ==================== 错题重做 ====================
    /** 进入错题重做模式：仅保留错题，重置其作答状态 */
    function redoWrongQuestions() {
        closeWrongModal();
        if (state.questions.length === 0) {
            showToast('题库为空', 'info');
            return;
        }

        // 收集所有错题的 realIdx
        const wrongIndices = [];
        state.questions.forEach((q, realIdx) => {
            if (state.quizStatus[realIdx] === 'incorrect') {
                wrongIndices.push(realIdx);
            }
        });

        if (wrongIndices.length === 0) {
            showToast('当前没有错题，无需重做', 'info');
            return;
        }

        // 保存当前完整的 quizOrder
        state.savedFullQuizOrder = [...state.quizOrder];
        state.wrongRedoMode = true;

        // 重置错题的作答状态
        wrongIndices.forEach(realIdx => {
            state.userAnswers[realIdx] = [];
            state.quizStatus[realIdx] = 'unanswered';
            // 为错题重新生成随机选项映射（如果开启了随机）
            if (state.shuffleEnabled) {
                const q = state.questions[realIdx];
                if (q.options && q.options.length > 0) {
                    const indices = q.options.map((_, i) => i);
                    shuffleArray(indices);
                    state.shuffledOptions[realIdx] = indices.map((origIdx, newPos) => ({
                        origIdx,
                        label: LABELS[newPos] || String(newPos + 1),
                        content: q.options[origIdx].content,
                        origLabel: q.options[origIdx].label
                    }));
                }
            }
        });

        // 设置 quizOrder 仅包含错题
        state.quizOrder = [...wrongIndices];
        state.quizIndex = 0;

        // 如果在解析模式，切换到刷题模式
        if (state.currentMode === 'parse') {
            switchMode('quiz');
        }

        renderQuizView();
        renderAnswerSheet();
        updateAIQuestionInfo();
        saveCurrentProgress();

        showToast(`已进入错题重做模式（${wrongIndices.length} 道错题）`, 'info');
    }

    /** 从历史记录进入错题重做模式 */
    function redoWrongFromHistory(index) {
        closeWrongModal();
        const record = state.historyRecords[index];
        if (!record) return;

        // 检查是否有错题
        const wrongIndices = [];
        if (record.quizStatus) {
            record.quizStatus.forEach((s, realIdx) => {
                if (s === 'incorrect') wrongIndices.push(realIdx);
            });
        }

        if (wrongIndices.length === 0) {
            showToast('该记录中没有错题', 'info');
            return;
        }

        // 先加载该历史记录（继续答题模式）
        continueHistory(index);

        // 稍后进入错题重做模式（continueHistory 会 switchMode，需要在之后执行）
        setTimeout(() => {
            redoWrongQuestions();
        }, 50);
    }

    /** 退出错题重做模式，恢复全部题目 */
    function exitWrongRedoMode() {
        if (!state.wrongRedoMode) return;

        state.wrongRedoMode = false;

        // 恢复完整的 quizOrder
        if (state.savedFullQuizOrder.length > 0) {
            state.quizOrder = [...state.savedFullQuizOrder];
        } else {
            state.quizOrder = generateQuizOrder(state.shuffleEnabled);
        }
        state.savedFullQuizOrder = [];

        // 跳转到第一道未答题
        const firstUnansweredPos = state.quizOrder.findIndex(
            realIdx => state.quizStatus[realIdx] === 'unanswered'
        );
        state.quizIndex = firstUnansweredPos >= 0 ? firstUnansweredPos : 0;

        renderQuizView();
        renderAnswerSheet();
        updateAIQuestionInfo();
        saveCurrentProgress();

        showToast('已退出错题重做模式', 'info');
    }

    // ==================== 清空 ====================
    function clearAll() {
        if (state.questions.length > 0 && !confirm('确定要清空输入区和所有解析记录吗？')) return;
        document.getElementById('inputText').value = '';
        autoResizeTextarea();
        state.questions = [];
        state.userAnswers = [];
        state.quizStatus = [];
        state.quizIndex = 0;
        state.quizOrder = [];
        state.shuffledOptions = [];
        state.wrongRedoMode = false;
        state.savedFullQuizOrder = [];
        aiState.chatCache = {};
        aiState.currentChatKey = null;
        renderParsePreview();
        updateStats();
        const aiFab = document.getElementById('aiFab');
        if (aiFab) aiFab.style.display = 'none';
        if (aiState.panelOpen) toggleAIPanel();
        showToast('已清空所有内容', 'info');
    }

    // 页面加载时拉取示例列表

            select.innerHTML = '';
            if (data.examples && data.examples.length > 0) {
                data.examples.forEach((ex, i) => {

                    opt.value = i;
                    opt.textContent = ex.name;
                    select.appendChild(opt);
                });

                select.innerHTML = '<option value="">暂无示例</option>';

    async function loadExample() {
        const select = document.getElementById('exampleSelect');
        const idx = select.value;
        if (idx === '' || idx === null) {
            showToast('请先选择一个示例题库', 'error');

            const timer = setTimeout(() => controller.abort(), 15000);
            const resp = await fetch(`https://zhixue-examples.vacuopolis.deno.net/api/example?index=${idx}`, { signal: controller.signal });
            clearTimeout(timer);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

            if (!data.text) throw new Error('返回内容为空');
            document.getElementById('inputText').value = data.text;
            autoResizeTextarea();
            const name = select.options[select.selectedIndex].textContent;
            showToast(`已加载示例「${name}」，点击"解析试题"查看效果`, 'info');

    // ==================== 本地持久化 ====================
    const STORAGE_KEY = 'quiz_system_history';

    function loadHistoryFromStorage() {
        try {
            const data = localStorage.getItem(STORAGE_KEY);
            if (data) {
                state.historyRecords = JSON.parse(data);
            }
        } catch (e) {
            console.warn('加载历史记录失败:', e);
            state.historyRecords = [];
        }
    }

    function saveHistoryToStorage() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state.historyRecords));
        } catch (e) {
            console.warn('保存历史记录失败:', e);
        }
    }

    // ==================== 解析历史 ====================
    function addHistory(questions) {
        const record = {
            id: Date.now(),
            time: new Date().toLocaleString('zh-CN'),
            count: questions.length,
            questions: JSON.parse(JSON.stringify(questions)),
            userAnswers: questions.map(() => []),
            quizStatus: questions.map(() => 'unanswered'),
            shuffledOptions: JSON.parse(JSON.stringify(state.shuffledOptions)),
            shuffleEnabled: state.shuffleEnabled,
            quizOrder: JSON.parse(JSON.stringify(state.quizOrder)),
            aiChatCache: {},
        };
        state._activeHistoryTime = record.time;
        state.historyRecords.unshift(record);
        if (state.historyRecords.length > 30) state.historyRecords.pop();
        saveHistoryToStorage();
        renderHistory();
    }

    function renderHistory() {
        const dropdown = document.getElementById('historyDropdown');
        const list = document.getElementById('historyList');
        const badge = document.getElementById('historyBadge');

        if (state.historyRecords.length === 0) {
            badge.classList.remove('visible');
            list.innerHTML = '<div class="hd-empty">暂无解析历史记录<br>解析试题后将自动保存</div>';
            return;
        }

        badge.classList.add('visible');
        let html = '';
        state.historyRecords.forEach((r, i) => {
            const answered = r.quizStatus ? r.quizStatus.filter(s => s !== 'unanswered').length : 0;
            const correct = r.quizStatus ? r.quizStatus.filter(s => s === 'correct').length : 0;
            const objectiveTotal = r.questions ? r.questions.filter(q => q.type !== 'subjective').length : 0;
            const isComplete = objectiveTotal > 0 && answered === objectiveTotal;
            const progressPct = objectiveTotal > 0 ? Math.round((answered / objectiveTotal) * 100) : 0;

            let progressColor = 'var(--primary)';
            if (isComplete) {
                const correctPct = Math.round((correct / objectiveTotal) * 100);
                progressColor = correctPct >= 80 ? 'var(--success)' : correctPct >= 60 ? 'var(--warning)' : 'var(--error)';
            }

            html += `<div class="history-item" style="flex-direction:column;align-items:stretch;gap:10px;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <div class="h-info">
                        <span class="h-time">${escapeHtml(r.time)}</span>
                        <span class="h-count">${r.count} 题</span>
                        ${isComplete ? `<span style="color:${progressColor};font-weight:600;font-size:0.8125rem;">${correct}/${objectiveTotal}</span>` : ''}
                    </div>
                    <button class="btn btn-sm btn-outline btn-outline-error" onclick="deleteHistory(${i})" style="padding:3px 8px;font-size:0.75rem;">✕</button>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    <div style="flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;">
                        <div style="height:100%;width:${progressPct}%;background:${progressColor};border-radius:3px;transition:width 0.3s;"></div>
                    </div>
                    <span style="font-size:0.75rem;color:var(--text-secondary);min-width:36px;text-align:right;">${progressPct}%</span>
                </div>
                <div style="display:flex;gap:6px;flex-wrap:wrap;">
                    <button class="btn btn-sm btn-primary" onclick="continueHistory(${i})" style="padding:4px 12px;font-size:0.8rem;">
                        ${answered > 0 ? '▶ 继续答题' : '▶ 开始答题'}
                    </button>
                    ${answered > 0 ? `<button class="btn btn-sm btn-outline" onclick="resetHistoryProgress(${i})" style="padding:4px 12px;font-size:0.8rem;">🔄 进度清零</button>` : ''}
                    <button class="btn btn-sm btn-outline" onclick="loadHistory(${i})" style="padding:4px 12px;font-size:0.8rem;">📄 仅加载题目</button>
                    ${r.quizStatus && r.quizStatus.some(s => s === 'incorrect') ? `<button class="btn btn-sm btn-outline btn-outline-error" onclick="viewWrongQuestions(${i})" style="padding:4px 12px;font-size:0.8rem;">❌ 查看错题</button>` : ''}
                    ${r.quizStatus && r.quizStatus.some(s => s === 'incorrect') ? `<button class="btn btn-sm btn-outline btn-outline-warn" onclick="redoWrongFromHistory(${i})" style="padding:4px 12px;font-size:0.8rem;">🔄 重做错题</button>` : ''}
                </div>
            </div>`;
        });
        list.innerHTML = html;
    }

    function continueHistory(index) {
        const record = state.historyRecords[index];
        if (!record) return;
        state._activeHistoryTime = record.time;
        state.questions = JSON.parse(JSON.stringify(record.questions));
        state.userAnswers = JSON.parse(JSON.stringify(record.userAnswers || record.questions.map(() => [])));
        state.quizStatus = JSON.parse(JSON.stringify(record.quizStatus || record.questions.map(() => 'unanswered')));
        state.quizIndex = 0;
        state.wrongRedoMode = false;
        state.savedFullQuizOrder = [];
        if (record.shuffledOptions && record.shuffledOptions.length > 0) {
            state.shuffledOptions = JSON.parse(JSON.stringify(record.shuffledOptions));
            state.shuffleEnabled = !!record.shuffleEnabled;
        } else {
            state.shuffledOptions = generateShuffledOptions(state.shuffleEnabled);
        }
        if (record.quizOrder && record.quizOrder.length > 0) {
            state.quizOrder = JSON.parse(JSON.stringify(record.quizOrder));
        } else {
            state.quizOrder = buildContinueQuizOrder();
        }
        document.getElementById('shuffleToggle').checked = state.shuffleEnabled;
        aiState.chatCache = JSON.parse(JSON.stringify(record.aiChatCache || {}));
        aiState.currentChatKey = null;
        const firstUnansweredPos = state.quizOrder.findIndex(
            realIdx => state.quizStatus[realIdx] === 'unanswered'
        );
        if (firstUnansweredPos >= 0) state.quizIndex = firstUnansweredPos;
        closeHistoryDropdown();
        renderParsePreview();
        updateStats();
        switchMode('quiz');
        showToast(`继续答题（已答 ${state.quizStatus.filter(s => s !== 'unanswered').length}/${state.questions.length}）`, 'info');
        const aiFab = document.getElementById('aiFab');
        if (aiFab) aiFab.style.display = 'flex';
    }

    function resetHistoryProgress(index) {
        if (!confirm('确定要清零该记录的答题进度吗？')) return;
        const record = state.historyRecords[index];
        if (!record) return;
        record.userAnswers = record.questions.map(() => []);
        record.quizStatus = record.questions.map(() => 'unanswered');
        record.aiChatCache = {};
        const tempQuestions = state.questions;
        state.questions = record.questions;
        record.shuffledOptions = generateShuffledOptions(!!record.shuffleEnabled);
        record.quizOrder = generateQuizOrder(!!record.shuffleEnabled);
        state.questions = tempQuestions;
        saveHistoryToStorage();
        renderHistory();
        showToast('答题进度已清零', 'info');
    }

    function deleteHistory(index) {
        if (!confirm('确定要删除这条历史记录吗？')) return;
        state.historyRecords.splice(index, 1);
        saveHistoryToStorage();
        renderHistory();
        showToast('历史记录已删除', 'info');
    }

    function loadHistory(index) {
        const record = state.historyRecords[index];
        if (!record) return;
        state._activeHistoryTime = record.time;
        state.questions = JSON.parse(JSON.stringify(record.questions));
        state.userAnswers = state.questions.map(() => []);
        state.quizStatus = state.questions.map(() => 'unanswered');
        state.quizIndex = 0;
        state.wrongRedoMode = false;
        state.savedFullQuizOrder = [];
        state.shuffleEnabled = !!record.shuffleEnabled;
        state.quizOrder = generateQuizOrder(state.shuffleEnabled);
        state.shuffledOptions = generateShuffledOptions(state.shuffleEnabled);
        document.getElementById('shuffleToggle').checked = state.shuffleEnabled;
        aiState.chatCache = {};
        aiState.currentChatKey = null;
        closeHistoryDropdown();

        // 将题目还原为文本并填入输入框
        const allText = state.questions.map(q => {
            let text = `${q.number}. ${q.text}`;

    /** 获取当前题目的上下文信息（用于API请求） */
    function getAIContext() {
        if (state.currentMode !== 'quiz' || state.questions.length === 0) return '';

        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const status = state.quizStatus[realIdx];
        const myAns = state.userAnswers[realIdx];
        const shuffled = state.shuffledOptions[realIdx] || [];
        const shuffledAnswer = getShuffledAnswer(realIdx);
        const isSubmitted = status !== 'unanswered';

        let ctx = `【题目】${q.text}\n`;
        if (shuffled.length > 0) {
            ctx += `【选项】\n`;
            shuffled.forEach(o => {
                ctx += `  ${o.label}. ${o.content}\n`;
            });
        }
        if (isSubmitted && shuffledAnswer) {
            ctx += `【正确答案】${shuffledAnswer}\n`;
        }
        if (isSubmitted && myAns.length > 0) {
            ctx += `【用户答案】${myAns.sort().join('')}\n`;
            if (status === 'incorrect') {
                ctx += `【答题结果】用户回答错误\n`;
            } else if (status === 'correct') {
                ctx += `【答题结果】用户回答正确\n`;
            }
        } else if (myAns.length > 0) {
            ctx += `【用户当前选择】${myAns.sort().join('')}（尚未提交）\n`;
        }

        return ctx;
    }

    /** 发送消息到DeepSeek API */
    async function sendAIMessage(overrideText) {
        const input = document.getElementById('aiInput');
        const sendBtn = document.getElementById('aiSendBtn');
        const userText = overrideText || (input ? input.value.trim() : '');

        if (!userText) return;
        if (aiState.isStreaming) return;

        if (!overrideText) {
            input.value = '';
            autoResizeAIInput(input);
        }

        const contextInfo = getAIContext();
        const contextMsg = contextInfo ? `当前题目信息：\n${contextInfo}\n---` : '';

        appendAIMessage('user', userText);

        const apiMessages = [
            { role: 'system', content: buildSystemPrompt() }
        ];

        if (contextMsg) {
            apiMessages.push({ role: 'system', content: contextMsg });
        }

        const currentMessages = getCurrentChatMessages();
        const recentHistory = currentMessages.slice(-20);
        apiMessages.push(...recentHistory);

        apiMessages.push({ role: 'user', content: userText });
        currentMessages.push({ role: 'user', content: userText });
        setCurrentChatMessages(currentMessages);

        // 显示加载动画
        const loadingEl = showAILoading();
        sendBtn.disabled = true;
        aiState.isStreaming = true;
        aiState.userScrolledUp = false;  // 开始新的流式输出时重置滚动状态

        try {
            aiState.abortCtrl = new AbortController();

            const response = await fetch(API_PROXY_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: 'deepseek-v4-flash',
                    messages: apiMessages,
                    stream: true,
                    max_tokens: 2048,
                    temperature: 0.7
                }),
                signal: aiState.abortCtrl.signal
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error?.message || `API请求失败 (${response.status})`);
            }

            // 移除加载动画，创建流式消息气泡
            removeAILoading(loadingEl);
            const msgEl = appendAIMessage('bot', '', true);

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = '';
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop() || '';

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed === 'data: [DONE]') continue;
                    if (!trimmed.startsWith('data: ')) continue;

                    try {
                        const json = JSON.parse(trimmed.slice(6));
                        const choice = json.choices?.[0];
                        const contentDelta = choice?.delta?.content;

                        if (contentDelta) {
                            fullContent += contentDelta;
                            msgEl.innerHTML = renderAIMarkdown(fullContent);
                            scrollToAIBottom(false);
                        }
                    } catch (e) {
                        // 忽略解析错误
                    }
                }
            }

            const currentMessages2 = getCurrentChatMessages();
            currentMessages2.push({ role: 'assistant', content: fullContent });
            setCurrentChatMessages(currentMessages2);
            msgEl.innerHTML = renderAIMarkdown(fullContent);

        } catch (err) {
            removeAILoading(loadingEl);
            if (err.name === 'AbortError') {
                appendAIMessage('bot', '⏹ 请求已取消');
            } else {
                appendAIError(err.message);
            }
        } finally {
            aiState.isStreaming = false;
            aiState.abortCtrl = null;
            sendBtn.disabled = false;
        }
    }

    /** Markdown渲染（支持流式不完整标记） */
    function renderAIMarkdown(text) {
        let html = escapeHtml(text);

        // 行内代码 `code`（优先处理，内部不再解析其他markdown）
        html = html.replace(/`([^`\n]+?)`/g, '<code>$1</code>');

        // 加粗 **text**
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        // 斜体 *text*（避免与加粗冲突，只匹配单个*且非列表行首）
        html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
        // 删除线 ~~text~~
        html = html.replace(/~~(.+?)~~/g, '<del>$1</del>');

        // 标题
        html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^###\s+(.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^##\s+(.+)$/gm, '<h4>$1</h4>');
        html = html.replace(/^#\s+(.+)$/gm, '<h4>$1</h4>');

        // 无序列表
        html = html.replace(/^[-]\s+(.+)$/gm, '<li>$1</li>');
        html = html.replace(/^[*]\s+(.+)$/gm, '<li>$1</li>');
        // 有序列表
        html = html.replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>');
        // 包裹连续li为ul
        html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

        // 换行
        html = html.replace(/\n/g, '<br>');
        // 清理多余br
        html = html.replace(/<br><ul>/g, '<ul>');
        html = html.replace(/<\/ul><br>/g, '</ul>');
        html = html.replace(/<br><h4>/g, '<h4>');
        html = html.replace(/<\/h4><br>/g, '</h4>');

        // 流式输出时：处理未闭合的 ** 标记
        // 计算未配对的 ** 数量（2个为一对）
        const remainingBold = html.match(/\*\*/g);
        if (remainingBold && remainingBold.length % 2 !== 0) {
            // 有未闭合的 **，替换最后一个为 <strong> 并在末尾闭合
            const lastIdx = html.lastIndexOf('**');
            html = html.substring(0, lastIdx) + '<strong>' + html.substring(lastIdx + 2);
            html += '</strong>';
        }

        // 处理未闭合的单 * 斜体（排除行首列表 * ）
        // 简单做法：如果还有残留的单 * 且不在行首，临时处理
        const remainingItalic = html.match(/(?<!\*)\*(?!\*)/g);
        if (remainingItalic && remainingItalic.length % 2 !== 0) {
            // 找最后一个未配对的 *
            const matches = [...html.matchAll(/(?<!\*)\*(?!\*)/g)];
            if (matches.length > 0) {
                const lastMatch = matches[matches.length - 1];
                const idx = lastMatch.index;
                // 排除行首的 *（列表符号已转换为 <li>）
                html = html.substring(0, idx) + '<em>' + html.substring(idx + 1);
                html += '</em>';
            }
        }

        return html;
    }

    let aiAutoScrolling = false;  // 标记程序触发的自动滚动

    /** 滚动到底部（仅当用户未主动上滚时才自动跟随） */
    function scrollToAIBottom(force) {
        const body = document.getElementById('aiPanelBody');
        if (!body) return;
        if (force || !aiState.userScrolledUp) {
            aiAutoScrolling = true;
            body.scrollTop = body.scrollHeight;
            // 滚动完成后短暂保持标记，防止 scroll 事件误判
            setTimeout(() => { aiAutoScrolling = false; }, 50);
        }
    }

    /** 监听AI面板滚动，判断用户是否主动上滚或滚回底部 */
    (function setupAIScrollListener() {
        const body = document.getElementById('aiPanelBody');
        if (!body) return;
        let lastScrollTop = body.scrollTop;
        body.addEventListener('scroll', () => {
            if (!aiState.isStreaming || aiAutoScrolling) {
                lastScrollTop = body.scrollTop;
                return;
            }
            const delta = body.scrollTop - lastScrollTop;
            lastScrollTop = body.scrollTop;
            if (delta < 0) {
                // 用户向上滚动（任意距离），立即停止自动跟随
                aiState.userScrolledUp = true;
            } else if (delta > 0) {
                // 用户向下滚动，检查是否已到达底部附近
                const isNearBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 80;
                if (isNearBottom) {
                    aiState.userScrolledUp = false;  // 滚回底部，恢复自动跟随
                }
            }
        }, { passive: true });
    })();

    // ==================== 键盘快捷键 ====================
    document.addEventListener('keydown', function(e) {
        // Escape: 关闭错题弹窗
        if (e.key === 'Escape') {
            const wrongModal = document.getElementById('wrongModalContainer');
            if (wrongModal && wrongModal.innerHTML.trim()) {
                closeWrongModal();
                e.preventDefault();
                return;
            }
        }

        // 如果焦点在输入框/文本域中，仅允许极少数全局快捷键
        const tag = document.activeElement.tagName;
        const inInput = tag === 'TEXTAREA' || tag === 'INPUT' || document.activeElement.isContentEditable;

        // --- 全局快捷键（任何模式下均生效） ---

        // Ctrl+Q: 切换到刷题模式
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'q') {
            e.preventDefault();
            if (state.currentMode !== 'quiz') switchMode('quiz');
            return;
        }
        // Ctrl+P: 切换到解析模式
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'p') {
            e.preventDefault();
            if (state.currentMode !== 'parse') switchMode('parse');
            return;
        }
        // Ctrl+I: 打开/关闭 AI 助手面板
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'i') {
            e.preventDefault();
            toggleAIPanel();
            return;
        }
        // Esc: 关闭 AI 面板（如果打开的话）
        if (e.key === 'Escape' && aiState.panelOpen) {
            e.preventDefault();
            toggleAIPanel();
            return;
        }

        // --- 解析模式快捷键 ---
        if (state.currentMode === 'parse' && !inInput) {
            // Ctrl+Enter: 解析试题
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                parseQuestions();
                return;
            }
        }

        // --- 以下快捷键仅在刷题模式下且不在输入框中时生效 ---
        if (state.currentMode !== 'quiz' || state.questions.length === 0 || inInput) return;

        const realIdx = getRealIndex(state.quizIndex);
        const q = state.questions[realIdx];
        const isSubmitted = state.quizStatus[realIdx] === 'correct' || state.quizStatus[realIdx] === 'incorrect';

        // ← 上一题
        if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevQuestion();
            return;
        }
        // → 下一题
        if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextQuestion();
            return;
        }
        // Enter: 提交答案（未提交时）
        if (e.key === 'Enter') {
            e.preventDefault();
            if (!isSubmitted && q.type !== 'subjective') {
                submitAnswer();
            }
            return;
        }
        // Ctrl+E: AI 解析本题
        if (e.ctrlKey && !e.shiftKey && !e.altKey && e.key.toLowerCase() === 'e') {
            e.preventDefault();
            if (!aiState.panelOpen) toggleAIPanel();
            aiQuickAsk('explain');
            return;
        }
        // Alt+W: AI 为什么错了
        if (e.altKey && !e.ctrlKey && !e.shiftKey && e.key.toLowerCase() === 'w') {
            e.preventDefault();
            if (!aiState.panelOpen) toggleAIPanel();
            aiQuickAsk('why_wrong');
            return;
        }
        // 数字键 1-9: 选择对应选项 A-I（未提交时，根据当前题目实际选项数动态映射）
        if (!isSubmitted) {
            const shuffled = state.shuffledOptions[realIdx];
            if (shuffled && shuffled.length > 0) {
                const num = parseInt(e.key);
                if (num >= 1 && num <= shuffled.length) {
                    const mappedLabel = shuffled[num - 1].label;
                    if (mappedLabel) {
                        e.preventDefault();
                        selectOption(mappedLabel);
                        return;
                    }
                }
            }
        }
    });

    // ==================== 错题回顾 ====================
    /** 将一道题还原为可粘贴到解析模式的文本 */
    function questionToText(q, answer) {
        let text = `${q.number}. ${q.text}`;
        if (q.options && q.options.length > 0) {
            q.options.forEach(opt => {
                text += `\n  ${opt.label}. ${opt.content}`;
            });
        }
        if (answer) {
            text += `\n正确答案：${answer}`;
        }
        return text;
    }

    /** 将一道题还原为可粘贴到解析模式的文本（使用原始label） */
    function questionToOriginalText(q, userAnswer, correctAnswer) {
        let text = `${q.number}. ${q.text}`;
        if (q.options && q.options.length > 0) {
            q.options.forEach(opt => {
                text += `\n  ${opt.label}. ${opt.content}`;
            });
        }
        if (correctAnswer) {
            text += `\n正确答案：${correctAnswer}`;
        }
        return text;
    }

    /** 从随机映射的答案还原为原始答案 */
    function getOriginalAnswer(realIdx, shuffledAns, record) {
        if (!shuffledAns || !record.shuffledOptions || !record.shuffledOptions[realIdx]) return shuffledAns;
        const mapping = record.shuffledOptions[realIdx];
        if (!mapping || mapping.length === 0) return shuffledAns;
        let origAns = '';
        for (const ch of shuffledAns) {
            const entry = mapping.find(m => m.label === ch);
            if (entry) origAns += entry.origLabel;
            else origAns += ch;
        }
        return origAns.split('').sort().join('');
    }

    /** 获取历史记录中的错题列表 */
    function getWrongQuestions(record) {
        const wrongList = [];
        if (!record.quizStatus || !record.questions) return wrongList;
        record.questions.forEach((q, realIdx) => {
            if (record.quizStatus[realIdx] === 'incorrect') {
                const userShuffledAns = (record.userAnswers[realIdx] || []).join('');
                const correctShuffledAns = getShuffledAnswerFromRecord(record, realIdx);
                const userOrigAns = getOriginalAnswer(realIdx, userShuffledAns, record);
                const correctOrigAns = getOriginalAnswer(realIdx, correctShuffledAns, record);
                wrongList.push({
                    realIdx,
                    question: q,
                    userAnswer: userOrigAns,
                    correctAnswer: correctOrigAns,
                    originalText: questionToOriginalText(q, userOrigAns, correctOrigAns)
                });
            }
        });
        return wrongList;
    }

    /** 从历史记录中获取某题的正确答案（shuffled label） */
    function getShuffledAnswerFromRecord(record, realIdx) {
        const q = record.questions[realIdx];
        if (!q || !q.answer) return '';
        const origAnswer = q.answer;
        const mapping = record.shuffledOptions ? record.shuffledOptions[realIdx] : null;
        if (!mapping || mapping.length === 0) return origAnswer;
        let shuffled = '';
        for (const ch of origAnswer) {
            const entry = mapping.find(m => m.origLabel === ch);
            if (entry) shuffled += entry.label;
            else shuffled += ch;
        }
        return shuffled;
    }

                    <button class="btn btn-sm btn-outline" onclick="closeWrongModal()" style="padding:4px 10px;font-size:0.85rem;">✕</button>

                        <button class="btn btn-sm btn-primary" onclick="loadWrongQuestionsToParse(${index})" style="padding:4px 12px;font-size:0.8rem;">📄 放入解析模式</button>

    /** 关闭错题弹窗 */
    function closeWrongModal(event) {

    /** 复制单道错题文本 */
    function copySingleWrongQuestion(historyIndex, realIdx) {
        const record = state.historyRecords[historyIndex];
        if (!record) return;
        const wrongList = getWrongQuestions(record);
        const item = wrongList.find(w => w.realIdx === realIdx);
        if (!item) return;
        const text = item.originalText;
        navigator.clipboard.writeText(text).then(() => {
            showToast('已复制该错题文本', 'success');
        }).catch(() => {
            fallbackCopy(text);
            showToast('已复制该错题文本', 'success');

    /** 从shuffled label映射回原始label */
    function mapShuffledToOrigLabel(realIdx, shuffledAns) {
        if (!shuffledAns) return '';
        const mapping = state.shuffledOptions[realIdx];
        if (!mapping || mapping.length === 0) return shuffledAns;
        let orig = '';
        for (const ch of shuffledAns) {
            const entry = mapping.find(m => m.label === ch);
            if (entry) orig += entry.origLabel;
            else orig += ch;
        }
        return orig.split('').sort().join('');
    }

    }

    /** 将当前会话错题加载到解析模式 */
    function loadCurrentWrongQuestionsToParse() {
        const wrongList = [];
        state.questions.forEach((q, realIdx) => {
            if (state.quizStatus[realIdx] === 'incorrect') {
                const correctShuffledAns = getShuffledAnswer(realIdx);
                const correctOrigAns = mapShuffledToOrigLabel(realIdx, correctShuffledAns);
                const userShuffledAns = (state.userAnswers[realIdx] || []).join('');
                const userOrigAns = mapShuffledToOrigLabel(realIdx, userShuffledAns);
                wrongList.push(questionToOriginalText(q, userOrigAns, correctOrigAns));
            }
        });
        if (wrongList.length === 0) {
            showToast('没有错题可加载', 'info');
            return;
        }
        const allText = wrongList.join('\n\n');
        document.getElementById('inputText').value = allText;
        autoResizeTextarea();
        closeWrongModal();
        switchMode('parse');
        showToast(`已将 ${wrongList.length} 道错题载入解析模式，点击"解析试题"即可重新解析`, 'info');
    }

    /** 剪贴板降级方案 */
    function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px;';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
    }

</script>
